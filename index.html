<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Pindejos Bowling</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- AppHeader.vue teleports its content into this element -->
<header></header>

<div class="container">

    <div id="matchups-content"></div>
  </div>
  <div id="section-rsvp" class="section">
    <div id="rsvp-content"></div>
  </div>
  <div id="section-standings" class="section">
    <div id="standings-content"></div>
  </div>
  <div id="section-history" class="section">
    <div id="history-content"></div>
  </div>
  <div id="section-more" class="section">
    <div id="more-content"></div>
  </div>
</div>

<!-- AppNav.vue teleports its content into this element -->
<nav></nav>

<!-- AppModal.vue teleports the .modal-backdrop directly to <body> -->

<!-- Vue mount point -->
<div id="vue-app"></div>
<script type="module" src="/src/main.js"></script>

</html>
