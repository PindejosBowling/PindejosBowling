<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Pindejos Bowling</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap');

:root {
  --bg: #0a0a0c; --surface: #131316; --surface2: #1c1c21; --surface3: #25252b;
  --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
  --accent: #e8ff47; --accent-dim: rgba(232,255,71,0.12);
  --accent2: #ff4f6d; --accent3: #4fc3ff;
  --text: #f0f0f0; --muted: #7a7a85; --muted2: #55555e;
  --success: #4ade80; --danger: #ff4f6d;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 76px; overflow-x: hidden; }

header { padding: 20px 20px 12px; position: sticky; top: 0; z-index: 50; background: linear-gradient(var(--bg) 70%, transparent); }
.logo-row { display: flex; align-items: baseline; gap: 10px; }
.logo { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 30px; letter-spacing: -0.5px; line-height: 1; color: var(--text); }
.logo span { color: var(--accent); }
.week-badge { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 3px 10px; margin-left: auto; }

.container { padding: 0 16px; }
.section { display: none; animation: fadeUp 0.25s ease; }
.section.active { display: block; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 0; gap: 16px; }
.spinner { width: 32px; height: 32px; border: 2px solid var(--surface2); border-top: 2px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 13px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }

.match-header { display: flex; align-items: center; gap: 10px; margin: 20px 0 12px; }
.match-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 22px; letter-spacing: 0.5px; text-transform: uppercase; }
.game-pill { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--accent); background: var(--accent-dim); border: 1px solid rgba(232,255,71,0.25); border-radius: 20px; padding: 3px 10px; }
.section-header { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: var(--muted); margin: 20px 0 12px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.section-header .actions { display: flex; gap: 6px; }
.section-header button { font-size: 10px; }

.matchup { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; overflow: hidden; margin-bottom: 16px; }
.team-block { padding: 14px 16px; }
.team-block.winner { background: rgba(232,255,71,0.04); }
.team-label { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
.team-label.winner { color: var(--accent); }
.player-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.player-row:last-child { border-bottom: none; }
.player-row.absent .player-name { color: var(--muted); }
.player-row.absent .player-avatar { opacity: 0.5; }
.absent-tag { font-size: 9px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: var(--danger); background: rgba(255,79,109,0.12); border: 1px solid rgba(255,79,109,0.3); border-radius: 4px; padding: 1px 5px; margin-left: 6px; }
.player-avatar { width: 34px; height: 34px; border-radius: 10px; background: var(--surface2); border: 1px solid var(--border2); display: flex; align-items: center; justify-content: center; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 14px; color: var(--muted); flex-shrink: 0; }
.player-info { flex: 1; min-width: 0; }
.player-name { font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; }
.player-avg { font-size: 12px; color: var(--muted); }
.score-inputs { display: flex; gap: 6px; flex-shrink: 0; }
.score-group { display: flex; flex-direction: column; align-items: center; gap: 3px; }
.score-label { font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted2); }

input[type=number], input[type=text] { background: var(--surface2); border: 1.5px solid var(--border2); border-radius: 10px; color: var(--text); text-align: center; font-weight: 600; font-family: 'Barlow Condensed', sans-serif; outline: none; transition: border-color 0.15s, background 0.15s; -moz-appearance: textfield; }
input[type=number] { width: 52px; height: 42px; font-size: 17px; }
input[type=number]::-webkit-inner-spin-button { display: none; }
input[type=number]:focus, input[type=text]:focus { border-color: var(--accent); background: #1a1e0a; }
input.has-score { border-color: rgba(232,255,71,0.35); color: var(--accent); }

textarea { width: 100%; background: var(--surface2); border: 1.5px solid var(--border2); border-radius: 10px; color: var(--text); padding: 10px 12px; font-family: 'Barlow', sans-serif; font-size: 14px; outline: none; resize: vertical; min-height: 70px; }
textarea:focus { border-color: var(--accent); }

.vs-bar { display: flex; align-items: center; position: relative; margin: 0; }
.vs-bar::before { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(255,79,109,0.08), transparent); }
.vs-left, .vs-right { flex: 1; height: 1px; background: var(--border2); }
.vs-chip { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 11px; letter-spacing: 2px; padding: 5px 14px; background: var(--accent2); color: white; border-radius: 20px; flex-shrink: 0; margin: 0 12px; }

.team-total-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px 12px; }
.total-label { font-size: 12px; color: var(--muted); font-weight: 500; }
.total-val { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 800; }
.total-winning { color: var(--accent); }
.total-losing { color: var(--muted); }

.standings-card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; overflow: hidden; }
.standings-header { display: grid; grid-template-columns: 28px 1fr 70px 60px 56px; gap: 8px; padding: 10px 16px; border-bottom: 1px solid var(--border); }
.standings-header span { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
.standings-header span:nth-child(3), .standings-header span:nth-child(4), .standings-header span:nth-child(5) { text-align: right; }
.standing-row { display: grid; grid-template-columns: 28px 1fr 70px 60px 56px; gap: 8px; padding: 13px 16px; border-bottom: 1px solid var(--border); align-items: center; transition: background 0.15s; cursor: pointer; }
.standing-row:last-child { border-bottom: none; }
.standing-row:hover { background: var(--surface2); }
.s-rank { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; color: var(--muted); }
.s-rank.top { color: var(--accent); }
.s-name { font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 700; }
.s-team { font-size: 11px; color: var(--muted); }
.s-wl { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700; text-align: right; }
.s-pins { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; text-align: right; color: var(--muted); }
.s-avg { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 800; text-align: right; }
.s-rank-1 .s-name { color: var(--accent); }

.rsvp-row { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-bottom: 1px solid var(--border); }
.rsvp-row:last-child { border-bottom: none; }
.rsvp-name { flex: 1; font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 700; }
.rsvp-buttons { display: flex; gap: 4px; }
.rsvp-btn { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 6px 12px; border-radius: 8px; border: 1.5px solid var(--border2); background: var(--surface2); color: var(--muted); cursor: pointer; transition: all 0.15s; }
.rsvp-btn.active.in { background: rgba(74,222,128,0.15); border-color: var(--success); color: var(--success); }
.rsvp-btn.active.out { background: rgba(255,79,109,0.15); border-color: var(--danger); color: var(--danger); }
.rsvp-summary { display: flex; gap: 8px; margin-bottom: 12px; }
.rsvp-stat { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; }
.rsvp-stat-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
.rsvp-stat-val { font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 800; line-height: 1.1; margin-top: 2px; }
.rsvp-stat.in .rsvp-stat-val { color: var(--success); }
.rsvp-stat.out .rsvp-stat-val { color: var(--danger); }
.rsvp-stat.unknown .rsvp-stat-val { color: var(--muted); }

.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; padding: 12px 18px; border-radius: 12px; border: 1.5px solid var(--border2); background: var(--surface2); color: var(--text); cursor: pointer; transition: all 0.15s; width: 100%; }
.btn:hover { background: var(--surface3); }
.btn:active { transform: scale(0.98); }
.btn.sm { padding: 6px 10px; font-size: 11px; width: auto; border-radius: 8px; }
.btn.primary { background: var(--accent); color: #0a0a0c; border-color: var(--accent); }
.btn.primary:hover { background: #d8ee37; }
.btn.danger { background: rgba(255,79,109,0.15); border-color: var(--danger); color: var(--danger); }
.btn-row { display: flex; gap: 8px; margin: 16px 0; }
.btn-row .btn { flex: 1; }

.toggle-group { display: flex; gap: 4px; background: var(--surface2); border-radius: 10px; padding: 3px; }
.toggle-btn { flex: 1; font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 8px 12px; border-radius: 8px; border: none; background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.toggle-btn.active { background: var(--accent); color: #0a0a0c; }

.season-bar { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 4px; display: flex; gap: 2px; margin-bottom: 14px; overflow-x: auto; }

.gen-controls { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 16px; margin-bottom: 16px; }
.gen-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
.gen-row:last-child { margin-bottom: 0; }
.gen-label { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }

.team-preview-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 12px; overflow: hidden; }
.tp-head { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; background: var(--surface2); border-bottom: 1px solid var(--border); }
.tp-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 17px; letter-spacing: 0.5px; }
.tp-total { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 17px; color: var(--accent); }
.tp-list { padding: 4px 14px; }
.tp-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
.tp-row:last-child { border-bottom: none; }
.tp-player { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
.tp-player.unavail { color: var(--muted); }
.tp-avg { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; color: var(--muted); }

.player-search { width: 100%; padding: 10px 14px; background: var(--surface2); border: 1.5px solid var(--border2); border-radius: 12px; color: var(--text); font-size: 14px; outline: none; margin-bottom: 12px; text-align: left; font-family: 'Barlow', sans-serif; font-weight: 500; }
.player-search:focus { border-color: var(--accent); }
.player-card { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 8px; cursor: pointer; transition: all 0.15s; }
.player-card:hover { background: var(--surface2); border-color: var(--border2); }
.player-card .player-avatar { width: 40px; height: 40px; font-size: 15px; }
.player-card-info { flex: 1; }
.player-card-name { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; }
.player-card-stats { font-size: 12px; color: var(--muted); margin-top: 2px; }
.player-card-avg { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 800; color: var(--accent); }

.player-detail { padding-bottom: 20px; }
.player-detail-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.back-btn { width: 36px; height: 36px; border-radius: 10px; background: var(--surface2); border: 1px solid var(--border2); color: var(--text); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.player-detail-name { font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 900; line-height: 1; }
.player-detail-team { font-size: 12px; color: var(--muted); margin-top: 2px; }

.stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 16px; }
.stat-tile { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 12px; text-align: center; }
.stat-tile-label { font-size: 10px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted); }
.stat-tile-val { font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 800; line-height: 1.1; margin-top: 4px; color: var(--accent); }

.chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 16px; margin-bottom: 16px; }
.chart-title { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
.chart-wrap { position: relative; height: 220px; }

.score-history-table { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
.score-history-row { display: grid; grid-template-columns: 50px 1fr 50px 50px 60px; gap: 8px; padding: 10px 14px; border-bottom: 1px solid var(--border); align-items: center; }
.score-history-row:last-child { border-bottom: none; }
.score-history-row.head { background: var(--surface2); }
.score-history-row.head span { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
.score-history-row span:not(:nth-child(1)):not(:nth-child(2)) { text-align: right; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; }
.sh-week { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 14px; }
.sh-team { font-size: 12px; color: var(--muted); }
.sh-absent { font-size: 10px; color: var(--danger); font-weight: 600; }

.board-composer { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 12px; margin-bottom: 16px; }
.board-author-row { display: flex; gap: 8px; margin-bottom: 8px; }
.board-author-input { flex: 1; padding: 8px 12px; background: var(--surface2); border: 1.5px solid var(--border2); border-radius: 10px; color: var(--text); font-size: 13px; outline: none; font-family: 'Barlow', sans-serif; font-weight: 500; text-align: left; }
.board-author-input:focus { border-color: var(--accent); }
.board-post { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 10px; }
.board-post-head { display: flex; align-items: baseline; gap: 8px; margin-bottom: 6px; }
.board-author { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 16px; color: var(--accent); }
.board-time { font-size: 11px; color: var(--muted); margin-left: auto; }
.board-msg { font-size: 14px; line-height: 1.5; color: var(--text); white-space: pre-wrap; word-wrap: break-word; }

.history-season { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; margin-bottom: 16px; overflow: hidden; }
.history-head { padding: 14px 16px; background: var(--surface2); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.history-season-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 18px; }
.history-champion { font-size: 12px; color: var(--accent); font-weight: 600; }

.week-selector { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.week-pill { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.5px; padding: 6px 14px; border-radius: 8px; background: var(--surface2); border: 1.5px solid var(--border2); color: var(--muted); cursor: pointer; transition: all 0.15s; }
.week-pill.active { background: var(--accent); color: #0a0a0c; border-color: var(--accent); }
.week-pill:hover:not(.active) { background: var(--surface3); }

.more-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.more-tile { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px 14px; cursor: pointer; transition: all 0.15s; text-align: center; }
.more-tile:hover { background: var(--surface2); border-color: var(--border2); }
.more-tile-icon { font-size: 24px; margin-bottom: 6px; }
.more-tile-label { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 14px; letter-spacing: 1px; text-transform: uppercase; }

nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(19,19,22,0.92); backdrop-filter: blur(16px); border-top: 1px solid var(--border); display: flex; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 0; cursor: pointer; color: var(--muted); font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; font-family: 'Barlow Condensed', sans-serif; border: none; background: none; transition: color 0.15s; }
.nav-btn.active { color: var(--accent); }
.nav-icon { font-size: 20px; line-height: 1; }

.error-banner { background: rgba(255,79,109,0.1); border: 1px solid rgba(255,79,109,0.25); border-radius: 12px; padding: 14px 16px; font-size: 13px; color: #ff8a9a; margin: 16px 0; }
.empty-state { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; }
.toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--surface3); border: 1px solid var(--border2); border-radius: 12px; padding: 10px 18px; font-size: 13px; font-weight: 600; z-index: 200; animation: toastIn 0.2s ease; }
.toast.success { border-color: var(--success); color: var(--success); }
.toast.error { border-color: var(--danger); color: var(--danger); }
@keyframes toastIn { from { opacity: 0; transform: translate(-50%, 10px); } to { opacity: 1; transform: translate(-50%, 0); } }

.modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 150; display: none; align-items: flex-end; backdrop-filter: blur(4px); }
.modal-backdrop.active { display: flex; animation: fadeUp 0.2s; }
.modal { background: var(--surface); border: 1px solid var(--border2); border-top-left-radius: 22px; border-top-right-radius: 22px; padding: 20px; width: 100%; max-height: 85vh; overflow-y: auto; padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
.modal-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 22px; margin-bottom: 14px; }
</style>
</head>
<body>

<header>
  <div class="logo-row">
    <div class="logo">PINDE<span>JOS</span></div>
    <div id="week-badge" class="week-badge">League</div>
  </div>
</header>

<div class="container">
  <div id="section-matchups" class="section active">
    <div id="matchups-content"><div class="loading"><div class="spinner"></div><div class="loading-text">Loading matchups</div></div></div>
  </div>
  <div id="section-rsvp" class="section">
    <div id="rsvp-content"><div class="loading"><div class="spinner"></div><div class="loading-text">Loading RSVP</div></div></div>
  </div>
  <div id="section-standings" class="section">
    <div id="standings-content"><div class="loading"><div class="spinner"></div><div class="loading-text">Loading standings</div></div></div>
  </div>
  <div id="section-board" class="section">
    <div id="board-content"><div class="loading"><div class="spinner"></div><div class="loading-text">Loading board</div></div></div>
  </div>
  <div id="section-more" class="section">
    <div id="more-content"></div>
  </div>
</div>

<div class="modal-backdrop" id="modal-backdrop" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-content"></div>
</div>

<nav>
  <button class="nav-btn active" id="nav-matchups" onclick="switchTab('matchups')"><span class="nav-icon">🎳</span>Matchups</button>
  <button class="nav-btn" id="nav-rsvp" onclick="switchTab('rsvp')"><span class="nav-icon">📋</span>RSVP</button>
  <button class="nav-btn" id="nav-standings" onclick="switchTab('standings')"><span class="nav-icon">📊</span>Standings</button>
  <button class="nav-btn" id="nav-board" onclick="switchTab('board')"><span class="nav-icon">💬</span>Board</button>
  <button class="nav-btn" id="nav-more" onclick="switchTab('more')"><span class="nav-icon">⋯</span>More</button>
</nav>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script>
const API = "https://script.google.com/macros/s/AKfycbz8sg1ZRlVaD0tXpN6GRlC1awZYu1_KhD7z5Bc88KjsTNntq1dBzAf8aHGbW0th_Tjhiw/exec";

// New Weekly Stats columns
const SC = {
  SEASON: 0, WEEK: 1, PLAYER: 2, TEAM: 3,
  G1: 4, G1_OPP: 5, G2: 6, G2_OPP: 7,
  PINS: 8, WINS: 9, LOSSES: 10, GAMES: 11, PRESENT: 12
};

const state = {
  current: null, roster: null, rsvp: null, stats: null,
  board: null, history: null, generated: null, settings: null,
  selectedPlayer: null,
  selectedSeason: null,
  selectedHistWeek: null,
  moreView: 'home',
  myName: localStorage.getItem('pb_myname') || '',
  genFillMode: 'League Avg',
  genAvgSource: 'last-season',
  genTeams: null
};

const $ = id => document.getElementById(id);
function initials(name) { if (!name) return '?'; return name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase(); }
function escapeHtml(s) { if (s == null) return ''; return s.toString().replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[c]); }
function timeAgo(date) {
  const d = new Date(date);
  const s = Math.floor((Date.now() - d.getTime()) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  if (s < 604800) return Math.floor(s/86400) + 'd ago';
  return d.toLocaleDateString();
}
function toast(msg, type = '') {
  const t = document.createElement('div'); t.className = 'toast ' + type; t.textContent = msg;
  document.body.appendChild(t); setTimeout(() => t.remove(), 2400);
}
function openModal(html) { $('modal-content').innerHTML = html; $('modal-backdrop').classList.add('active'); }
function closeModal() { $('modal-backdrop').classList.remove('active'); }
async function apiGet(action) { const r = await fetch(`${API}?action=${action}`); return r.json(); }
async function apiPost(action, payload = {}) {
  const r = await fetch(API, { method: 'POST', body: JSON.stringify({ action, ...payload }) });
  return r.json();
}

// Treats sheet TRUE/'TRUE'/1 as truthy
function isPresent(v) { return v === true || v === 'TRUE' || v === 1 || v === '1'; }

// ============================================================
// STATS DERIVATION
// ============================================================
function statsRows() { return state.stats ? state.stats.slice(1).filter(r => r[SC.PLAYER]) : []; }
function getSeasons() {
  const s = new Set();
  statsRows().forEach(r => { if (r[SC.SEASON] !== '' && r[SC.SEASON] != null) s.add(String(r[SC.SEASON])); });
  return Array.from(s).sort();
}
function getCurrentSeason() {
  const s = getSeasons(); return s.length ? s[s.length - 1] : '1';
}

// Aggregate (Present=TRUE only, unless includeAbsent=true for matchup history)
function aggregateStandings(season, opts = {}) {
  const includeAbsent = !!opts.includeAbsent;
  const players = {};
  statsRows().forEach(r => {
    if (String(r[SC.SEASON]) !== String(season)) return;
    if (!includeAbsent && !isPresent(r[SC.PRESENT])) return;
    const name = r[SC.PLAYER];
    if (!players[name]) players[name] = { name, team: r[SC.TEAM], wins: 0, losses: 0, pins: 0, games: 0, weeks: new Set(), highGame: 0 };
    players[name].wins += parseInt(r[SC.WINS]) || 0;
    players[name].losses += parseInt(r[SC.LOSSES]) || 0;
    players[name].pins += parseInt(r[SC.PINS]) || 0;
    players[name].games += parseInt(r[SC.GAMES]) || 0;
    players[name].weeks.add(String(r[SC.WEEK]));
    players[name].team = r[SC.TEAM];
    const g1 = parseInt(r[SC.G1]) || 0;
    const g2 = parseInt(r[SC.G2]) || 0;
    if (g1 > players[name].highGame) players[name].highGame = g1;
    if (g2 > players[name].highGame) players[name].highGame = g2;
  });
  return Object.values(players).map(p => ({
    ...p, avg: p.games ? p.pins / p.games : 0, weekCount: p.weeks.size
  })).sort((a, b) => b.wins - a.wins || b.avg - a.avg);
}

function getPlayerProfile(name, season) {
  // season optional → all-time when omitted
  const games = [];
  const rows = statsRows().filter(r => r[SC.PLAYER] === name && (!season || String(r[SC.SEASON]) === String(season)));
  // Only count games for averages if Present=true
  rows.forEach(r => {
    const present = isPresent(r[SC.PRESENT]);
    const g1 = parseInt(r[SC.G1]) || 0;
    const g2 = parseInt(r[SC.G2]) || 0;
    if (r[SC.G1] !== '' && g1 > 0) games.push({ season: r[SC.SEASON], week: r[SC.WEEK], team: r[SC.TEAM], score: g1, gameNum: 1, present });
    if (r[SC.G2] !== '' && g2 > 0) games.push({ season: r[SC.SEASON], week: r[SC.WEEK], team: r[SC.TEAM], score: g2, gameNum: 2, present });
  });
  const presentGames = games.filter(g => g.present);
  const allScores = presentGames.map(g => g.score);
  const allTimeAvg = allScores.length ? allScores.reduce((a,b)=>a+b,0) / allScores.length : 0;
  const last5 = allScores.slice(-5);
  const last5Avg = last5.length ? last5.reduce((a,b)=>a+b,0) / last5.length : 0;
  const presentRows = rows.filter(r => isPresent(r[SC.PRESENT]));
  const totalWins = presentRows.reduce((a,r) => a + (parseInt(r[SC.WINS])||0), 0);
  const totalLosses = presentRows.reduce((a,r) => a + (parseInt(r[SC.LOSSES])||0), 0);
  const totalGames = presentRows.reduce((a,r) => a + (parseInt(r[SC.GAMES])||0), 0);
  const totalPins = presentRows.reduce((a,r) => a + (parseInt(r[SC.PINS])||0), 0);
  const highGame = allScores.length ? Math.max(...allScores) : 0;

  // Season avg = avg in current selected season (Present=TRUE)
  const curSeason = getCurrentSeason();
  const seasonGames = games.filter(g => g.present && String(g.season) === String(curSeason)).map(g => g.score);
  const seasonAvg = seasonGames.length ? seasonGames.reduce((a,b)=>a+b,0) / seasonGames.length : 0;

  return {
    name, games, rows,
    allTimeAvg, seasonAvg, last5Avg,
    totalWins, totalLosses, totalGames, totalPins, highGame
  };
}

// Real matchups using G1/G2 Opp columns
function getMatchupsForWeek(season, week) {
  // Returns array of matchup objects, one per game (so 2 entries for a normal week, possibly 1+ for playoffs)
  const rows = statsRows().filter(r =>
    String(r[SC.SEASON]) === String(season) && String(r[SC.WEEK]) === String(week)
  );
  if (!rows.length) return [];

  // Build per-game matchup structures
  // Game 1: group by team's G1 score; pair Team X vs G1Opp
  // Game 2: same with G2

  const buildGameMap = (gameNum) => {
    const teamRosters = {};   // teamName -> [{ name, score, w, l, present }]
    rows.forEach(r => {
      const team = r[SC.TEAM];
      const opp = r[gameNum === 1 ? SC.G1_OPP : SC.G2_OPP];
      const score = parseInt(r[gameNum === 1 ? SC.G1 : SC.G2]) || 0;
      if (!team || !opp) return;  // skip rows without this game (e.g. playoff 1-game-only)
      if (!teamRosters[team]) teamRosters[team] = { team, opp, players: [], total: 0 };
      teamRosters[team].players.push({
        name: r[SC.PLAYER], score, present: isPresent(r[SC.PRESENT])
      });
      teamRosters[team].total += score;
    });
    return teamRosters;
  };

  const buildPairings = (gameNum) => {
    const map = buildGameMap(gameNum);
    const seen = new Set();
    const pairings = [];
    Object.values(map).forEach(t => {
      if (seen.has(t.team)) return;
      const oppData = map[t.opp];
      if (oppData && oppData.opp === t.team) {
        seen.add(t.team); seen.add(t.opp);
        pairings.push({ gameNum, a: t, b: oppData });
      } else {
        seen.add(t.team);
        pairings.push({ gameNum, a: t, b: null });
      }
    });
    return pairings;
  };

  return [...buildPairings(1), ...buildPairings(2)];
}

function getWeeksForSeason(season) {
  const weeks = new Set();
  statsRows().forEach(r => { if (String(r[SC.SEASON]) === String(season) && r[SC.WEEK] !== '' && r[SC.WEEK] != null) weeks.add(String(r[SC.WEEK])); });
  return Array.from(weeks).sort((a, b) => {
    const na = parseInt(a), nb = parseInt(b);
    if (!isNaN(na) && !isNaN(nb)) return na - nb;
    if (!isNaN(na)) return -1;
    if (!isNaN(nb)) return 1;
    return a.localeCompare(b);
  });
}

// ============================================================
// TAB SWITCHING
// ============================================================
function switchTab(tab) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  $('section-' + tab).classList.add('active');
  $('nav-' + tab).classList.add('active');
  if (tab !== 'players-detail') state.selectedPlayer = null;
  if (tab === 'rsvp') renderRSVP();
  if (tab === 'standings') renderStandings();
  if (tab === 'board') renderBoard();
  if (tab === 'more') { state.moreView = 'home'; renderMore(); }
}

// ============================================================
// MATCHUPS — current week
// ============================================================
function getTeamTotals(d) {
  const sum = (rows, col) => rows.reduce((a, r) => a + (Number(r[col]) || 0), 0);
  return {
    t1g1: sum(d.slice(5,8), 2), t3g1: sum(d.slice(5,8), 6),
    t2g1: sum(d.slice(10,13), 2), t4g1: sum(d.slice(10,13), 6),
    t4g2: sum(d.slice(18,21), 2), t1g2: sum(d.slice(18,21), 6),
    t3g2: sum(d.slice(23,26), 2), t2g2: sum(d.slice(23,26), 6)
  };
}

function getPlayerCurrentAvg(name) {
  const standings = aggregateStandings(getCurrentSeason());
  const p = standings.find(s => s.name === name);
  return p && p.avg ? p.avg : 0;
}

function isPlayerOut(name) {
  if (!state.rsvp) return false;
  for (let i = 1; i < state.rsvp.length; i++) {
    if (state.rsvp[i][0] === name) return state.rsvp[i][1] === 'Out';
  }
  return false;
}

function renderPlayerRow(name, g1Val, g2Val, cellG1, cellG2) {
  const ini = initials(name);
  const avg = getPlayerCurrentAvg(name);
  const absent = isPlayerOut(name);
  const g1 = cellG1 ? `<div class="score-group"><span class="score-label">G1</span><input type="number" class="${g1Val ? 'has-score' : ''}" placeholder="—" value="${g1Val || ''}" data-cell="${cellG1}" onchange="saveScore(this)"></div>` : '';
  const g2 = cellG2 ? `<div class="score-group"><span class="score-label">G2</span><input type="number" class="${g2Val ? 'has-score' : ''}" placeholder="—" value="${g2Val || ''}" data-cell="${cellG2}" onchange="saveScore(this)"></div>` : '';
  return `<div class="player-row ${absent ? 'absent' : ''}">
    <div class="player-avatar">${ini}</div>
    <div class="player-info">
      <div class="player-name">${escapeHtml(name)}${absent ? '<span class="absent-tag">OUT</span>' : ''}</div>
      ${avg > 0 ? `<div class="player-avg">avg ${avg.toFixed(1)}</div>` : ''}
    </div>
    <div class="score-inputs">${g1}${g2}</div>
  </div>`;
}

function renderTeamBlock(label, players, winning, total) {
  const cls = total > 0 ? (winning ? 'total-winning' : 'total-losing') : '';
  const winnerCls = total > 0 && winning ? 'winner' : '';
  return `<div class="team-block ${winnerCls}">
    <div class="team-label ${winnerCls}">${label}</div>
    ${players}
    ${total > 0 ? `<div class="team-total-row"><span class="total-label">Team total</span><span class="total-val ${cls}">${total}</span></div>` : ''}
  </div>`;
}

function renderMatchups() {
  const d = state.current; if (!d) return;
  const T = getTeamTotals(d);

  const buildRows = (rows, isCol1, gameNum) => rows.map(i => {
    const row = d[i]; if (!row) return '';
    const name = isCol1 ? row[0] : row[4];
    if (!name) return '';
    const score = isCol1 ? row[2] : row[6];
    const cellLetter = isCol1 ? 'C' : 'G';
    const cell = `${cellLetter}${i+1}`;
    return gameNum === 1
      ? renderPlayerRow(name, score, null, cell, null)
      : renderPlayerRow(name, null, score, null, cell);
  }).join('');

  const t1g1 = buildRows([5,6,7], true, 1);
  const t3g1 = buildRows([5,6,7], false, 1);
  const t2g1 = buildRows([10,11,12], true, 1);
  const t4g1 = buildRows([10,11,12], false, 1);
  const t4g2 = buildRows([18,19,20], true, 2);
  const t1g2 = buildRows([18,19,20], false, 2);
  const t3g2 = buildRows([23,24,25], true, 2);
  const t2g2 = buildRows([23,24,25], false, 2);

  const weekVal = d[0] ? d[0][0] : '';

  let html = `<div class="match-header"><div class="match-title">Game 1</div><div class="game-pill">This Week</div></div>`;
  html += `<div class="matchup">
    ${renderTeamBlock('Team 1', t1g1, T.t1g1 > T.t3g1, T.t1g1)}
    <div class="vs-bar"><div class="vs-left"></div><div class="vs-chip">VS</div><div class="vs-right"></div></div>
    ${renderTeamBlock('Team 3', t3g1, T.t3g1 > T.t1g1, T.t3g1)}
  </div>`;
  html += `<div class="matchup">
    ${renderTeamBlock('Team 2', t2g1, T.t2g1 > T.t4g1, T.t2g1)}
    <div class="vs-bar"><div class="vs-left"></div><div class="vs-chip">VS</div><div class="vs-right"></div></div>
    ${renderTeamBlock('Team 4', t4g1, T.t4g1 > T.t2g1, T.t4g1)}
  </div>`;
  html += `<div class="match-header"><div class="match-title">Game 2</div></div>`;
  html += `<div class="matchup">
    ${renderTeamBlock('Team 4', t4g2, T.t4g2 > T.t1g2, T.t4g2)}
    <div class="vs-bar"><div class="vs-left"></div><div class="vs-chip">VS</div><div class="vs-right"></div></div>
    ${renderTeamBlock('Team 1', t1g2, T.t1g2 > T.t4g2, T.t1g2)}
  </div>`;
  html += `<div class="matchup">
    ${renderTeamBlock('Team 3', t3g2, T.t3g2 > T.t2g2, T.t3g2)}
    <div class="vs-bar"><div class="vs-left"></div><div class="vs-chip">VS</div><div class="vs-right"></div></div>
    ${renderTeamBlock('Team 2', t2g2, T.t2g2 > T.t3g2, T.t2g2)}
  </div>`;

  $('matchups-content').innerHTML = html;
  if (weekVal) {
    const wStr = weekVal.toString();
    $('week-badge').textContent = wStr.toLowerCase().includes('week') ? wStr : `Week ${wStr}`;
  }
}

async function saveScore(input) {
  const cell = input.dataset.cell, val = input.value;
  if (!cell || val === '') return;
  input.style.opacity = '0.5';
  try {
    await apiPost('updateScore', { cell, score: val });
    input.classList.add('has-score');
    if (state.current) {
      const m = cell.match(/([A-Z]+)(\d+)/);
      if (m) {
        const col = m[1].charCodeAt(0) - 65, row = parseInt(m[2]) - 1;
        if (state.current[row]) state.current[row][col] = parseInt(val);
        renderMatchups();
      }
    }
    toast('Saved', 'success');
  } catch(e) { toast('Save failed', 'error'); }
  input.style.opacity = '1';
}

// ============================================================
// RSVP
// ============================================================
function renderRSVP() {
  if (!state.roster) return;
  const players = state.roster.slice(1).filter(r => r[0]);
  const rsvpMap = {};
  if (state.rsvp) state.rsvp.slice(1).forEach(r => { if (r[0]) rsvpMap[r[0]] = r[1]; });

  let inCount = 0, outCount = 0, unknown = 0;
  players.forEach(p => {
    const s = rsvpMap[p[0]];
    if (s === 'In') inCount++;
    else if (s === 'Out') outCount++;
    else unknown++;
  });

  let html = `<div class="rsvp-summary">
    <div class="rsvp-stat in"><div class="rsvp-stat-label">In</div><div class="rsvp-stat-val">${inCount}</div></div>
    <div class="rsvp-stat out"><div class="rsvp-stat-label">Out</div><div class="rsvp-stat-val">${outCount}</div></div>
    <div class="rsvp-stat unknown"><div class="rsvp-stat-label">No reply</div><div class="rsvp-stat-val">${unknown}</div></div>
  </div>`;

  html += `<div class="section-header">This Week<div class="actions"><button class="btn sm danger" onclick="confirmResetRSVP()">Reset</button></div></div>
    <div class="standings-card">`;
  players.forEach(p => {
    const status = rsvpMap[p[0]] || '';
    html += `<div class="rsvp-row">
      <div class="rsvp-name">${escapeHtml(p[0])}</div>
      <div class="rsvp-buttons">
        <button class="rsvp-btn in ${status==='In'?'active':''}" onclick="setRSVP('${escapeHtml(p[0])}', 'In')">In</button>
        <button class="rsvp-btn out ${status==='Out'?'active':''}" onclick="setRSVP('${escapeHtml(p[0])}', 'Out')">Out</button>
      </div>
    </div>`;
  });
  html += `</div>`;
  $('rsvp-content').innerHTML = html;
}

async function setRSVP(name, status) {
  try {
    await apiPost('updateRSVP', { name, status });
    if (!state.rsvp) state.rsvp = [['Player','Status','Note','Updated']];
    let found = false;
    for (let i = 1; i < state.rsvp.length; i++) {
      if (state.rsvp[i][0] === name) { state.rsvp[i][1] = status; found = true; break; }
    }
    if (!found) state.rsvp.push([name, status, '', new Date()]);
    renderRSVP();
    renderMatchups();   // re-render to show OUT tags
    toast(`${name}: ${status}`, 'success');
  } catch(e) { toast('Could not save', 'error'); }
}

function confirmResetRSVP() {
  openModal(`<div class="modal-title">Reset RSVPs?</div>
    <p style="color:var(--muted);font-size:14px;line-height:1.5;margin-bottom:16px;">
      This clears every RSVP for the upcoming week. Use this before requesting fresh responses.
    </p>
    <div class="btn-row">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn danger" onclick="doResetRSVP()">Reset All</button>
    </div>`);
}

async function doResetRSVP() {
  closeModal();
  toast('Resetting...');
  try {
    await apiPost('resetRSVP');
    state.rsvp = [['Player','Status','Note','Updated']];
    // Roster statuses also reset
    if (state.roster) {
      for (let i = 1; i < state.roster.length; i++) {
        if (state.roster[i][0]) state.roster[i][1] = 'Unavailable';
      }
    }
    renderRSVP();
    renderMatchups();
    toast('RSVPs reset', 'success');
  } catch(e) { toast('Reset failed', 'error'); }
}

// ============================================================
// STANDINGS — standalone tab
// ============================================================
function renderStandings() {
  const seasons = getSeasons();
  if (!state.selectedSeason) state.selectedSeason = getCurrentSeason();

  let html = `<div class="section-header">Standings</div>`;
  if (seasons.length > 1) {
    html += `<div class="season-bar">`;
    seasons.forEach(s => {
      html += `<button class="toggle-btn ${state.selectedSeason === s ? 'active' : ''}" onclick="state.selectedSeason='${s}';renderStandings();">Season ${s}</button>`;
    });
    html += `</div>`;
  }

  const rows = aggregateStandings(state.selectedSeason);
  if (!rows.length) {
    html += `<div class="empty-state">No data for this season yet.</div>`;
    $('standings-content').innerHTML = html;
    return;
  }

  html += `<div class="standings-card">
    <div class="standings-header"><span>#</span><span>Bowler</span><span>W—L</span><span>Pins</span><span>Avg</span></div>`;
  rows.forEach((r, i) => {
    const rank = i + 1;
    html += `<div class="standing-row ${rank===1?'s-rank-1':''}" onclick="openPlayerDetail('${escapeHtml(r.name)}')">
      <div class="s-rank ${rank<=3?'top':''}">${rank}</div>
      <div><div class="s-name">${escapeHtml(r.name)}</div>${r.team ? `<div class="s-team">${escapeHtml(r.team)}</div>` : ''}</div>
      <div class="s-wl">${r.wins}—${r.losses}</div>
      <div class="s-pins">${r.pins || '—'}</div>
      <div class="s-avg">${r.avg > 0 ? r.avg.toFixed(1) : '—'}</div>
    </div>`;
  });
  html += `</div>`;
  $('standings-content').innerHTML = html;
}

function openPlayerDetail(name) {
  state.selectedPlayer = name;
  state.moreView = 'player-detail';
  switchTab('more');
}

// ============================================================
// MORE
// ============================================================
function renderMore() {
  if (state.moreView === 'player-list') return renderPlayerList();
  if (state.moreView === 'player-detail') return renderPlayerDetail();
  if (state.moreView === 'matchup-history') return renderMatchupHistoryView();
  if (state.moreView === 'season-history') return renderSeasonHistoryView();

  // home view — season selector + tile menu
  const seasons = getSeasons();
  if (!state.selectedSeason) state.selectedSeason = getCurrentSeason();

  let html = '';
  if (seasons.length > 1) {
    html += `<div class="section-header">Filter by Season</div>
      <div class="season-bar">`;
    seasons.forEach(s => {
      html += `<button class="toggle-btn ${state.selectedSeason === s ? 'active' : ''}" onclick="state.selectedSeason='${s}';renderMore();">Season ${s}</button>`;
    });
    html += `</div>`;
  }

  html += `<div class="section-header">League Tools</div>
    <div class="more-grid">
      <div class="more-tile" onclick="state.moreView='player-list';renderMore();"><div class="more-tile-icon">👤</div><div class="more-tile-label">Players</div></div>
      <div class="more-tile" onclick="state.moreView='matchup-history';state.selectedHistWeek=null;renderMore();"><div class="more-tile-icon">🗓️</div><div class="more-tile-label">Match History</div></div>
      <div class="more-tile" onclick="openGenerate()"><div class="more-tile-icon">⚖️</div><div class="more-tile-label">Generate Teams</div></div>
      <div class="more-tile" onclick="state.moreView='season-history';renderMore();"><div class="more-tile-icon">🏆</div><div class="more-tile-label">Season History</div></div>
      <div class="more-tile" onclick="confirmArchive()"><div class="more-tile-icon">📦</div><div class="more-tile-label">Archive & Advance</div></div>
      <div class="more-tile" onclick="confirmEndSeason()"><div class="more-tile-icon">🥇</div><div class="more-tile-label">End Season</div></div>
    </div>`;
  $('more-content').innerHTML = html;
}

function backToMore() {
  state.moreView = 'home';
  state.selectedPlayer = null;
  renderMore();
}

// PLAYER LIST
function renderPlayerList() {
  if (!state.stats) return;
  const playerNames = Array.from(new Set(statsRows().map(r => r[SC.PLAYER]))).filter(Boolean).sort();

  let html = `<div class="section-header">
    <button class="btn sm" onclick="backToMore()">← Back</button>
    <span style="margin-left:auto;">Players</span>
  </div>
  <input type="text" class="player-search" placeholder="Search bowlers..." oninput="filterPlayers(this.value)">
  <div id="players-list">`;
  playerNames.forEach(name => {
    const p = getPlayerProfile(name);
    html += `<div class="player-card" data-name="${escapeHtml(name).toLowerCase()}" onclick="state.selectedPlayer='${escapeHtml(name)}';state.moreView='player-detail';renderMore();">
      <div class="player-avatar">${initials(name)}</div>
      <div class="player-card-info">
        <div class="player-card-name">${escapeHtml(name)}</div>
        <div class="player-card-stats">${p.totalGames} games · ${p.totalWins}W ${p.totalLosses}L${p.highGame ? ' · high ' + p.highGame : ''}</div>
      </div>
      <div class="player-card-avg">${p.allTimeAvg ? p.allTimeAvg.toFixed(1) : '—'}</div>
    </div>`;
  });
  html += `</div>`;
  $('more-content').innerHTML = html;
}

function filterPlayers(q) {
  q = q.toLowerCase();
  document.querySelectorAll('#players-list .player-card').forEach(c => {
    c.style.display = c.dataset.name.includes(q) ? '' : 'none';
  });

function renderPlayerDetail() {
  const name = state.selectedPlayer;
  const p = getPlayerProfile(name);

  let html = `<div class="player-detail">
    <div class="player-detail-header">
      <button class="back-btn" onclick="state.moreView='player-list';renderMore();">←</button>
      <div>
        <div class="player-detail-name">${escapeHtml(name)}</div>
        ${p.games.length ? `<div class="player-detail-team">Most recent: ${escapeHtml(p.games[p.games.length-1].team || '')}</div>` : '<div class="player-detail-team">New bowler — no history yet</div>'}
      </div>
    </div>
    <div class="stat-grid">
      <div class="stat-tile"><div class="stat-tile-label">All-time avg</div><div class="stat-tile-val">${p.allTimeAvg ? p.allTimeAvg.toFixed(1) : '—'}</div></div>
      <div class="stat-tile"><div class="stat-tile-label">Season avg</div><div class="stat-tile-val">${p.seasonAvg ? p.seasonAvg.toFixed(1) : '—'}</div></div>
      <div class="stat-tile"><div class="stat-tile-label">Last 5 avg</div><div class="stat-tile-val">${p.last5Avg ? p.last5Avg.toFixed(1) : '—'}</div></div>
      <div class="stat-tile"><div class="stat-tile-label">High game</div><div class="stat-tile-val">${p.highGame || '—'}</div></div>
      <div class="stat-tile"><div class="stat-tile-label">W—L</div><div class="stat-tile-val">${p.totalWins}—${p.totalLosses}</div></div>
      <div class="stat-tile"><div class="stat-tile-label">Games</div><div class="stat-tile-val">${p.totalGames}</div></div>
    </div>`;

  if (p.games.length) {
    html += `<div class="chart-card">
      <div class="chart-title">Score progression</div>
      <div class="chart-wrap"><canvas id="player-chart"></canvas></div>
    </div>`;
    html += `<div class="section-header">Game log</div>
      <div class="score-history-table">
        <div class="score-history-row head">
          <span>Wk</span><span>Team</span><span>G1</span><span>G2</span><span>Total</span>
        </div>`;
    p.rows.slice().reverse().forEach(r => {
      const g1 = parseInt(r[SC.G1]) || 0;
      const g2 = parseInt(r[SC.G2]) || 0;
      const total = parseInt(r[SC.PINS]) || 0;
      const present = isPresent(r[SC.PRESENT]);
      html += `<div class="score-history-row">
        <span class="sh-week">${escapeHtml(r[SC.WEEK])}${!present ? ' <span class="sh-absent">OUT</span>' : ''}</span>
        <span class="sh-team">${escapeHtml(r[SC.TEAM])}</span>
        <span>${g1 || '—'}</span>
        <span>${r[SC.G2] === '' ? '—' : (g2 || '—')}</span>
        <span>${total || '—'}</span>
      </div>`;
    });
    html += `</div>`;
  } else {
    html += `<div class="empty-state">No games recorded yet.</div>`;
  }
  html += `</div>`;
  $('more-content').innerHTML = html;
  if (p.games.length) drawPlayerChart(p);
}

function drawPlayerChart(p) {
  const labels = [], data = [], weekLabels = [];
  const presentGames = p.games.filter(g => g.present);
  presentGames.forEach(g => {
    labels.push('G' + g.gameNum);
    weekLabels.push(String(g.week));
    data.push(g.score);
  });
  const avgVal = p.allTimeAvg;

  const groupedWeekLabels = labels.map((_, i) => {
    if (i === 0) return weekLabels[i];
    return (weekLabels[i] === weekLabels[i-1] && presentGames[i].season === presentGames[i-1].season) ? '' : weekLabels[i];
  });

  const weekLabelPlugin = {
    id: 'weekLabelPlugin',
    afterDraw(chart) {
      const { ctx, chartArea, scales } = chart;
      const x = scales.x;
      ctx.save();
      ctx.font = '700 10px Barlow Condensed';
      ctx.textAlign = 'center';
      const groups = [];
      let lastWeek = '', groupStartX = null, groupCount = 0;
      groupedWeekLabels.forEach((w, i) => {
        if (w !== '') {
          if (groupStartX !== null) groups.push({ label: lastWeek, start: groupStartX, count: groupCount });
          lastWeek = w; groupStartX = i; groupCount = 1;
        } else groupCount++;
      });
      if (groupStartX !== null) groups.push({ label: lastWeek, start: groupStartX, count: groupCount });

      const yPos = chartArea.bottom + 38;
      groups.forEach(g => {
        const xStart = x.getPixelForValue(g.start);
        const xEnd = x.getPixelForValue(g.start + g.count - 1);
        const xMid = (xStart + xEnd) / 2;
        ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(xStart - 4, yPos - 8);
        ctx.lineTo(xStart - 4, yPos - 4);
        ctx.lineTo(xEnd + 4, yPos - 4);
        ctx.lineTo(xEnd + 4, yPos - 8);
        ctx.stroke();
        const isPlayoff = isNaN(parseInt(g.label));
        ctx.fillStyle = isPlayoff ? '#ff4f6d' : '#7a7a85';
        ctx.fillText(isPlayoff ? g.label : 'Wk ' + g.label, xMid, yPos + 6);
      });
      ctx.restore();
    }
  };

  if (window.__playerChart) window.__playerChart.destroy();
  window.__playerChart = new Chart($('player-chart'), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Score', data,
        borderColor: '#e8ff47', backgroundColor: 'rgba(232,255,71,0.12)',
        borderWidth: 2, fill: true, tension: 0.3,
        pointBackgroundColor: '#e8ff47', pointBorderColor: '#0a0a0c', pointBorderWidth: 2, pointRadius: 3
      }, {
        label: 'Avg', data: labels.map(() => avgVal),
        borderColor: 'rgba(255,79,109,0.6)', borderWidth: 1.5, borderDash: [4, 4],
        pointRadius: 0, fill: false
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      layout: { padding: { bottom: 32 } },
      plugins: { legend: { display: false } },
      scales: {
        y: { ticks: { color: '#7a7a85', font: { family: 'Barlow' } }, grid: { color: 'rgba(255,255,255,0.05)' } },
        x: { ticks: { color: '#7a7a85', font: { family: 'Barlow Condensed', size: 10, weight: '700' } }, grid: { display: false } }
      }
    },
    plugins: [weekLabelPlugin]
  });
}

// MATCHUP HISTORY — using opp columns for real matchups
function renderMatchupHistoryView() {
  const seasons = getSeasons();
  if (!state.selectedSeason) state.selectedSeason = getCurrentSeason();
  const weeks = getWeeksForSeason(state.selectedSeason);
  if (!state.selectedHistWeek || !weeks.includes(state.selectedHistWeek)) {
    state.selectedHistWeek = weeks[weeks.length - 1] || null;
  }

  let html = `<div class="section-header">
    <button class="btn sm" onclick="backToMore()">← Back</button>
    <span style="margin-left:auto;">Match History</span>
  </div>`;

  if (seasons.length > 1) {
    html += `<div class="season-bar">`;
    seasons.forEach(s => {
      html += `<button class="toggle-btn ${state.selectedSeason === s ? 'active' : ''}" onclick="state.selectedSeason='${s}';state.selectedHistWeek=null;renderMore();">Season ${s}</button>`;
    });
    html += `</div>`;
  }

  if (!weeks.length) {
    html += `<div class="empty-state">No weeks recorded for this season.</div>`;
    $('more-content').innerHTML = html;
    return;
  }

  html += `<div class="week-selector">`;
  weeks.forEach(w => {
    const isPlayoff = isNaN(parseInt(w));
    html += `<button class="week-pill ${state.selectedHistWeek === w ? 'active' : ''}" onclick="state.selectedHistWeek='${w}';renderMore();">${isPlayoff ? w : 'Wk ' + w}</button>`;
  });
  html += `</div>`;

  const matchups = getMatchupsForWeek(state.selectedSeason, state.selectedHistWeek);
  if (!matchups.length) {
    html += `<div class="empty-state">No data for this week.</div>`;
    $('more-content').innerHTML = html;
    return;
  }

  // Group by gameNum
  const game1 = matchups.filter(m => m.gameNum === 1);
  const game2 = matchups.filter(m => m.gameNum === 2);

  if (game1.length) {
    html += `<div class="match-header"><div class="match-title">Game 1</div></div>`;
    game1.forEach(m => html += renderHistoricalMatchup(m));
  }
  if (game2.length) {
    html += `<div class="match-header"><div class="match-title">Game 2</div></div>`;
    game2.forEach(m => html += renderHistoricalMatchup(m));
  }

  $('more-content').innerHTML = html;
}

function renderHistoricalMatchup(m) {
  const a = m.a, b = m.b;
  if (!b) {
    return `<div class="matchup">
      ${renderHistoricalTeamBlock(a, true)}
    </div>`;
  }
  const aWin = a.total >= b.total;
  return `<div class="matchup">
    ${renderHistoricalTeamBlock(a, aWin)}
    <div class="vs-bar"><div class="vs-left"></div><div class="vs-chip">VS</div><div class="vs-right"></div></div>
    ${renderHistoricalTeamBlock(b, !aWin)}
  </div>`;
}

function renderHistoricalTeamBlock(t, winning) {
  const cls = winning ? 'winner' : '';
  return `<div class="team-block ${cls}">
    <div class="team-label ${cls}">${escapeHtml(t.team)}</div>
    ${t.players.map(p => `
      <div class="player-row ${!p.present ? 'absent' : ''}">
        <div class="player-avatar">${initials(p.name)}</div>
        <div class="player-info">
          <div class="player-name">${escapeHtml(p.name)}${!p.present ? '<span class="absent-tag">OUT</span>' : ''}</div>
        </div>
        <div class="score-inputs"><div class="score-group"><span class="score-label">Score</span>
          <div style="width:52px;height:42px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;color:${p.score?'var(--text)':'var(--muted)'};">${p.score || '—'}</div>
        </div></div>
      </div>`).join('')}
    <div class="team-total-row"><span class="total-label">Team total</span><span class="total-val ${winning ? 'total-winning' : 'total-losing'}">${t.total}</span></div>
  </div>`;
}

// SEASON HISTORY
function renderSeasonHistoryView() {
  let html = `<div class="section-header">
    <button class="btn sm" onclick="backToMore()">← Back</button>
    <span style="margin-left:auto;">Season History</span>
  </div>`;
  if (!state.history || state.history.length < 2) {
    html += `<div class="empty-state">No past seasons archived. Use "End Season" to crown a champion.</div>`;
    $('more-content').innerHTML = html;
    return;
  }
  state.history.slice(1).reverse().forEach(r => {
    if (!r[0]) return;
    html += `<div class="history-season">
      <div class="history-head">
        <div class="history-season-name">${escapeHtml(r[0])}</div>
        ${r[1] ? `<div class="history-champion">🏆 ${escapeHtml(r[1])} · ${r[2] || '—'} avg · ${r[3] || 0}W</div>` : ''}
      </div>
    </div>`;
  });
  $('more-content').innerHTML = html;
}

// ============================================================
// GENERATE TEAMS — fully in-app
// ============================================================
function openGenerate() {
  let html = `<div class="modal-title">Generate Teams</div>
    <div class="gen-controls">
      <div class="gen-row">
        <div class="gen-label">Avg source</div>
        <div class="toggle-group">
          <button class="toggle-btn active" id="gen-src-last" onclick="setGenSrc('last-season')">Last season</button>
          <button class="toggle-btn" id="gen-src-current" onclick="setGenSrc('current-season')">This season</button>
          <button class="toggle-btn" id="gen-src-all" onclick="setGenSrc('all-time')">All-time</button>
        </div>
      </div>
      <div class="gen-row">
        <div class="gen-label">Fill mode (for absent)</div>
        <div class="toggle-group">
          <button class="toggle-btn active" id="gen-mode-league" onclick="setGenMode('League Avg')">League avg</button>
          <button class="toggle-btn" id="gen-mode-player" onclick="setGenMode('Player Avg')">Player avg</button>
        </div>
      </div>
    </div>
    <button class="btn primary" onclick="runGenerate()">Generate</button>
    <div id="gen-output" style="margin-top:16px;"></div>`;
  openModal(html);
  state.genFillMode = 'League Avg';
  state.genAvgSource = 'last-season';
}

function setGenMode(mode) {
  state.genFillMode = mode;
  $('gen-mode-league').classList.toggle('active', mode === 'League Avg');
  $('gen-mode-player').classList.toggle('active', mode === 'Player Avg');
}
function setGenSrc(src) {
  state.genAvgSource = src;
  $('gen-src-last').classList.toggle('active', src === 'last-season');
  $('gen-src-current').classList.toggle('active', src === 'current-season');
  $('gen-src-all').classList.toggle('active', src === 'all-time');
}

async function runGenerate() {
  $('gen-output').innerHTML = `<div class="loading"><div class="spinner"></div><div class="loading-text">Generating...</div></div>`;
  try {
    const res = await apiPost('generateTeams', { fillMode: state.genFillMode, avgSource: state.genAvgSource });
    if (res.error) throw new Error(res.error);
    state.genTeams = res.teams;
    renderGeneratedPreview(res);
  } catch(e) {
    $('gen-output').innerHTML = `<div class="error-banner">Could not generate: ${e.message || e}</div>`;
  }
}

function renderGeneratedPreview(res) {
  const teams = res.teams;
  let html = `<div class="section-header">Proposed teams<span style="font-size:10px;color:var(--muted);font-weight:600;">League avg ${res.leagueAvg.toFixed(1)}</span></div>`;
  teams.forEach((t, i) => {
    html += `<div class="team-preview-card">
      <div class="tp-head"><div class="tp-name">Team ${i+1}</div><div class="tp-total">${Math.round(t.total)}</div></div>
      <div class="tp-list">`;
    t.players.forEach(p => {
      const cls = p.status === 'Unavailable' ? 'unavail' : '';
      const isNew = p.sourceAvg === undefined;
      html += `<div class="tp-row">
        <div class="tp-player ${cls}">${escapeHtml(p.name)}
          ${p.status === 'Unavailable' ? '<span style="color:var(--muted);font-size:11px;">(out)</span>' : ''}
          ${isNew ? '<span style="color:var(--accent);font-size:10px;font-weight:700;">NEW</span>' : ''}
        </div>
        <div class="tp-avg">${p.avg.toFixed(1)}</div>
      </div>`;
    });
    html += `</div></div>`;
  });

  if (teams.length > 1) {
    const totals = teams.map(t => t.total);
    const spread = Math.max(...totals) - Math.min(...totals);
    const color = spread < 20 ? 'var(--success)' : spread < 40 ? 'var(--accent)' : 'var(--danger)';
    html += `<div style="text-align:center;font-size:12px;color:var(--muted);margin:8px 0 12px;">Balance spread: <strong style="color:${color}">${spread.toFixed(0)} pins</strong></div>`;
  }

  html += `<div class="btn-row">
    <button class="btn" onclick="runGenerate()">Regenerate</button>
    <button class="btn primary" onclick="confirmTeams()">Confirm</button>
  </div>`;

  $('gen-output').innerHTML = html;
}

async function confirmTeams() {
  if (!state.genTeams) return;
  try {
    await apiPost('confirmMatchups', { teams: state.genTeams.map(t => t.players) });
    toast('Matchups set!', 'success');
    closeModal();
    await loadAll();
    switchTab('matchups');
  } catch(e) { toast('Confirm failed', 'error'); }
}

// ARCHIVE & ADVANCE
function confirmArchive() {
  openModal(`<div class="modal-title">Archive & Advance Week?</div>
    <p style="color:var(--muted);font-size:14px;line-height:1.5;margin-bottom:16px;">
      This saves all current scores to <strong style="color:var(--text)">Weekly Stats</strong>, advances to the next week number, and clears the scorecard.
    </p>
    <div class="btn-row">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="doArchive()">Archive & Advance</button>
    </div>`);
}

async function doArchive() {
  closeModal();
  toast('Archiving...');
  try {
    const res = await apiPost('archiveAndAdvance');
    if (res.error) throw new Error(res.error);
    await loadAll();
    toast(`Archived ${res.rowsAdded} rows · now Week ${res.week + 1}`, 'success');
  } catch(e) { toast('Archive failed', 'error'); }
}

// END SEASON
function confirmEndSeason() {
  openModal(`<div class="modal-title">End the Season?</div>
    <p style="color:var(--muted);font-size:14px;line-height:1.5;margin-bottom:16px;">
      Crowns this season's champion (most wins), saves them to <strong style="color:var(--text)">League History</strong>, then rolls forward to a new season number with Week 1.
    </p>
    <div class="btn-row">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="doEndSeason()">End Season</button>
    </div>`);
}

async function doEndSeason() {
  closeModal();
  toast('Ending season...');
  try {
    const res = await apiPost('endSeason');
    if (res.error) throw new Error(res.error);
    await loadAll();
    toast(`🏆 ${res.champion} wins Season ${res.season}!`, 'success');
  } catch(e) { toast('Could not end season: ' + (e.message || e), 'error'); }
}

// ============================================================
// BOARD
// ============================================================
function renderBoard() {
  let html = `<div class="board-composer">
    <div class="board-author-row">
      <input type="text" class="board-author-input" id="board-author" placeholder="Your name" value="${escapeHtml(state.myName)}">
    </div>
    <textarea id="board-msg" placeholder="Talk shit about your league..." maxlength="500"></textarea>
    <div style="margin-top:10px"><button class="btn primary" onclick="postMessage()">Post</button></div>
  </div>`;

  if (!state.board || state.board.length < 2) {
    html += `<div class="empty-state">No posts yet. Be the first to talk shit.</div>`;
  } else {
    html += `<div class="section-header">Recent posts</div>`;
    state.board.slice(1).filter(r => r[0]).reverse().forEach(p => {
      html += `<div class="board-post">
        <div class="board-post-head">
          <div class="board-author">${escapeHtml(p[1])}</div>
          <div class="board-time">${timeAgo(p[0])}</div>
        </div>
        <div class="board-msg">${escapeHtml(p[2])}</div>
      </div>`;
    });
  }
  $('board-content').innerHTML = html;
}

async function postMessage() {
  const author = $('board-author').value.trim();
  const msg = $('board-msg').value.trim();
  if (!author || !msg) { toast('Need a name and a message', 'error'); return; }
  state.myName = author;
  localStorage.setItem('pb_myname', author);
  try {
    await apiPost('postToBoard', { author, message: msg });
    if (!state.board) state.board = [['Timestamp','Author','Message','ID']];
    state.board.push([new Date().toISOString(), author, msg, '']);
    $('board-msg').value = '';
    renderBoard();
    toast('Posted', 'success');
  } catch(e) { toast('Failed to post', 'error'); }
}

// ============================================================
// LOAD
// ============================================================
async function loadAll() {
  try {
    const all = await apiGet('getAll');
    state.current = all.currentWeek;
    state.roster = all.roster;
    state.rsvp = all.rsvp;
    state.stats = all.stats;
    state.board = all.board;
    state.history = all.history;
    state.generated = all.generated;
    state.settings = all.settings;
    renderMatchups();
  } catch(e) {
    $('matchups-content').innerHTML = `<div class="error-banner">⚠️ Could not connect to the league sheet. Check the API URL or your connection.</div>`;
  }
}

loadAll();
</script>
