<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Pindejos Bowling</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <div class="logo-row">
    <span class="logo-emoji">🎳</span>
    <div class="logo"><span class="pin">PIN</span><span class="dejos">DEJOS</span></div>
    <div class="week-badge-wrap">
      <div class="week-badge" id="week-badge">Week 1</div>
      <div class="season-badge" id="season-badge">Season 1</div>
    </div>
  </div>
</header>

<div class="container">
  <div id="section-matchups" class="section active">
    <div id="matchups-content"><div class="loading"><div class="spinner"></div><div class="loading-text">Loading matchups</div></div></div>
  </div>
  <div id="section-rsvp" class="section">
    <div id="rsvp-content"><div class="loading"><div class="spinner"></div><div class="loading-text">Loading RSVP</div></div></div>
  </div>
  <div id="section-standings" class="section">
    <div id="standings-content"><div class="loading"><div class="spinner"></div><div class="loading-text">Loading standings</div></div></div>
  </div>
  <div id="section-history" class="section">
    <div id="history-content"><div class="loading"><div class="spinner"></div><div class="loading-text">Loading history</div></div></div>
  </div>
  <div id="section-more" class="section">
    <div id="more-content"></div>
  </div>
</div>

<div class="modal-backdrop" id="modal-backdrop" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-content"></div>
</div>

<nav>
  <button class="nav-btn active" id="nav-matchups" onclick="switchTab('matchups')"><span class="nav-icon">🎳</span>This Week</button>
  <button class="nav-btn" id="nav-rsvp" onclick="switchTab('rsvp')"><span class="nav-icon">📋</span>RSVP</button>
  <button class="nav-btn" id="nav-standings" onclick="switchTab('standings')"><span class="nav-icon">📊</span>Standings</button>
  <button class="nav-btn" id="nav-history" onclick="switchTab('history')"><span class="nav-icon">🗓️</span>Matches</button>
  <button class="nav-btn" id="nav-more" onclick="switchTab('more')"><span class="nav-icon">⋯</span>More</button>
</nav>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="app.js"></script>
</body>
</html>
