<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Pindejos Bowling</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap');
:root {
  --bg: #0a0a0c; --surface: #131316; --surface2: #1c1c21; --surface3: #25252b;
  --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
  --accent: #e8ff47; --accent-dim: rgba(232,255,71,0.12);
  --accent2: #ff4f6d; --accent3: #4fc3ff; --gold: #fbbf24;
  --text: #f0f0f0; --muted: #7a7a85; --muted2: #55555e;
  --success: #4ade80; --danger: #ff4f6d;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 84px; overflow-x: hidden; }
header { padding: 18px 20px 12px; position: sticky; top: 0; z-index: 50; background: linear-gradient(var(--bg) 70%, transparent); }
.logo-row { display: flex; align-items: center; gap: 10px; }
.logo-emoji { font-size: 28px; line-height: 1; filter: drop-shadow(0 2px 8px rgba(232,255,71,0.3)); }
.logo { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 28px; letter-spacing: -0.5px; line-height: 1; }
.logo .pin { color: var(--accent); }
.logo .dejos { color: var(--text); }
.week-badge-wrap { margin-left: auto; text-align: right; }
.week-badge { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--accent); line-height: 1; }
.season-badge { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); line-height: 1; margin-top: 3px; }

.container { padding: 0 16px; }
.section { display: none; animation: fadeUp 0.25s ease; }
.section.active { display: block; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 0; gap: 16px; }
.spinner { width: 32px; height: 32px; border: 2px solid var(--surface2); border-top: 2px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 13px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }

.tab-title { display: flex; align-items: center; gap: 10px; margin: 6px 0 14px; }
.tab-title h2 { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 28px; letter-spacing: -0.5px; line-height: 1; text-transform: uppercase; }
.tab-title .pill { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--accent); background: var(--accent-dim); border: 1px solid rgba(232,255,71,0.25); border-radius: 20px; padding: 3px 10px; }
.view-flip { margin-left: auto; height: 28px; padding: 4px 22px 4px 10px; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; background-color: transparent; border-color: var(--border2); color: var(--muted); background-position: right 6px center; cursor: pointer; }
.view-flip:hover { color: var(--text); }
.league-avg-banner { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; margin-bottom: 14px; display: flex; align-items: center; gap: 12px; }
.league-avg-info { flex: 1; min-width: 0; }
.league-avg-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
.league-avg-val { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 24px; color: var(--accent); line-height: 1.1; }
.avg-source-select { height: 32px; padding: 4px 24px 4px 10px; font-size: 11px; font-weight: 700; letter-spacing: 0.5px; }

.match-header { display: flex; align-items: center; gap: 10px; margin: 20px 0 12px; }
.match-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 22px; letter-spacing: 0.5px; text-transform: uppercase; }
.section-header { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: var(--muted); margin: 20px 0 12px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.section-header .actions { display: flex; gap: 6px; align-items: center; }
.section-header .right-text { color: var(--muted); font-size: 11px; font-weight: 500; letter-spacing: 0.5px; text-transform: none; }

.matchup { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; overflow: hidden; margin-bottom: 16px; }
.team-block { padding: 14px 16px; }
.team-block.winner { background: rgba(232,255,71,0.04); }
.team-label { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
.team-label.winner { color: var(--accent); }
.player-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.player-row:last-child { border-bottom: none; }
.player-row.absent .player-name { color: var(--muted); }
.player-row.absent .player-avatar { opacity: 0.5; }
.absent-tag { font-size: 9px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: var(--danger); background: rgba(255,79,109,0.12); border: 1px solid rgba(255,79,109,0.3); border-radius: 4px; padding: 1px 5px; margin-left: 6px; }
.fill-tag { font-size: 9px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: var(--muted); background: var(--surface3); border: 1px solid var(--border2); border-radius: 4px; padding: 1px 5px; margin-left: 6px; }
.champ-crown { color: var(--gold); font-size: 13px; margin-left: 5px; filter: drop-shadow(0 1px 3px rgba(251,191,36,0.4)); }

.player-avatar { width: 34px; height: 34px; border-radius: 10px; background: var(--surface2); border: 1px solid var(--border2); display: flex; align-items: center; justify-content: center; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 14px; color: var(--muted); flex-shrink: 0; position: relative; }
.player-avatar.champ { background: linear-gradient(135deg, rgba(251,191,36,0.18), rgba(251,191,36,0.06)); border-color: rgba(251,191,36,0.4); color: var(--gold); }
.player-info { flex: 1; min-width: 0; }
.player-name { font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; }
.player-avg { font-size: 12px; color: var(--muted); }
.score-inputs { display: flex; gap: 6px; flex-shrink: 0; }
.score-group { display: flex; flex-direction: column; align-items: center; gap: 3px; }
.score-label { font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted2); }
.score-display { width: 52px; height: 42px; display: flex; align-items: center; justify-content: center; font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 18px; }

input[type=number], input[type=text], select { background: var(--surface2); border: 1.5px solid var(--border2); border-radius: 10px; color: var(--text); text-align: center; font-weight: 600; font-family: 'Barlow Condensed', sans-serif; outline: none; transition: border-color 0.15s, background 0.15s; -moz-appearance: textfield; }
input[type=number] { width: 52px; height: 42px; font-size: 17px; }
input[type=number]::-webkit-inner-spin-button { display: none; }
input[type=number]:focus, input[type=text]:focus, select:focus { border-color: var(--accent); background: #1a1e0a; }
input.has-score { border-color: rgba(232,255,71,0.35); color: var(--accent); }
.score-input-wrap { position: relative; display: inline-block; }
.score-confirm { position: absolute; top: -6px; right: -8px; width: 24px; height: 24px; padding: 0; border-radius: 50%; background: var(--success); color: #0a0a0c; border: 2px solid var(--bg); font-size: 14px; font-weight: 800; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 5; box-shadow: 0 2px 6px rgba(74,222,128,0.4); animation: confirmIn 0.18s; }
.score-confirm:disabled { opacity: 0.5; }
@keyframes confirmIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
select { padding: 8px 28px 8px 12px; height: 38px; font-size: 13px; letter-spacing: 0.5px; appearance: none; background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'%3E%3Cpath fill='%237a7a85' d='M0 0l5 6 5-6z'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 10px center; cursor: pointer; }
textarea { width: 100%; background: var(--surface2); border: 1.5px solid var(--border2); border-radius: 10px; color: var(--text); padding: 10px 12px; font-family: 'Barlow', sans-serif; font-size: 14px; outline: none; resize: vertical; min-height: 70px; }
textarea:focus { border-color: var(--accent); }

.vs-bar { display: flex; align-items: center; position: relative; margin: 0; }
.vs-bar::before { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(255,79,109,0.08), transparent); }
.vs-left, .vs-right { flex: 1; height: 1px; background: var(--border2); }
.vs-chip { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 11px; letter-spacing: 2px; padding: 5px 14px; background: var(--accent2); color: white; border-radius: 20px; flex-shrink: 0; margin: 0 12px; }

.team-total-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px 12px; gap: 12px; }
.total-label { font-size: 12px; color: var(--muted); font-weight: 500; }
.total-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
.total-val { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 800; line-height: 1; }
.total-winning { color: var(--accent); }
.total-losing { color: var(--muted); }
.expected-line { font-size: 10px; color: var(--muted); font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }

.standings-card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; overflow: hidden; }
.standings-header { display: grid; grid-template-columns: 28px 1fr 70px 60px 56px; gap: 8px; padding: 10px 16px; border-bottom: 1px solid var(--border); }
.standings-header span { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
.standings-header span:nth-child(3), .standings-header span:nth-child(4), .standings-header span:nth-child(5) { text-align: right; }
.standing-row { display: grid; grid-template-columns: 28px 1fr 70px 60px 56px; gap: 8px; padding: 13px 16px; border-bottom: 1px solid var(--border); align-items: center; transition: background 0.15s; cursor: pointer; }
.standing-row:last-child { border-bottom: none; }
.standing-row:hover { background: var(--surface2); }
.s-rank { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; color: var(--muted); }
.s-rank.top { color: var(--accent); }
.s-name { font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 700; display: flex; align-items: center; }
.s-team { font-size: 11px; color: var(--muted); }
.s-wl { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700; text-align: right; }
.s-pins { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; text-align: right; color: var(--muted); }
.s-avg { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 800; text-align: right; }
.s-rank-1 .s-name { color: var(--accent); }

.rsvp-row { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-bottom: 1px solid var(--border); }
.rsvp-row.pending { background: rgba(232,255,71,0.04); }
.rsvp-row:last-child { border-bottom: none; }
.pending-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); margin-left: 6px; display: inline-block; box-shadow: 0 0 8px rgba(232,255,71,0.5); }
.confirm-bar { position: sticky; bottom: 76px; margin: 12px -16px 0; padding: 12px 16px; background: rgba(19,19,22,0.96); backdrop-filter: blur(12px); border-top: 1px solid var(--border2); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; z-index: 80; animation: slideUp 0.2s; }
.confirm-bar-text { flex: 1; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 1px; text-transform: uppercase; color: var(--accent); }
.confirm-bar-actions { display: flex; gap: 6px; }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.rsvp-name { flex: 1; font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 700; display: flex; align-items: center; }
.rsvp-buttons { display: flex; gap: 4px; }
.rsvp-btn { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 6px 12px; border-radius: 8px; border: 1.5px solid var(--border2); background: var(--surface2); color: var(--muted); cursor: pointer; transition: all 0.15s; }
.rsvp-btn.active.in { background: rgba(74,222,128,0.15); border-color: var(--success); color: var(--success); }
.rsvp-btn.active.out { background: rgba(255,79,109,0.15); border-color: var(--danger); color: var(--danger); }
.rsvp-summary { display: flex; gap: 8px; margin-bottom: 12px; }
.rsvp-stat { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; }
.rsvp-stat-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
.rsvp-stat-val { font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 800; line-height: 1.1; margin-top: 2px; }
.rsvp-stat.in .rsvp-stat-val { color: var(--success); }
.rsvp-stat.out .rsvp-stat-val { color: var(--danger); }
.rsvp-stat.unknown .rsvp-stat-val { color: var(--muted); }

.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; padding: 12px 18px; border-radius: 12px; border: 1.5px solid var(--border2); background: var(--surface2); color: var(--text); cursor: pointer; transition: all 0.15s; width: 100%; }
.btn:hover { background: var(--surface3); }
.btn:active { transform: scale(0.98); }
.btn.sm { padding: 6px 10px; font-size: 11px; width: auto; border-radius: 8px; }
.btn.primary { background: var(--accent); color: #0a0a0c; border-color: var(--accent); }
.btn.primary:hover { background: #d8ee37; }
.btn.danger { background: rgba(255,79,109,0.15); border-color: var(--danger); color: var(--danger); }
.btn-row { display: flex; gap: 8px; margin: 16px 0; }
.btn-row .btn { flex: 1; }

.toggle-group { display: flex; gap: 4px; background: var(--surface2); border-radius: 10px; padding: 3px; }
.toggle-btn { flex: 1; font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 8px 12px; border-radius: 8px; border: none; background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.toggle-btn.active { background: var(--accent); color: #0a0a0c; }

.filter-bar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.filter-bar select { flex: 1; min-width: 0; }

.gen-controls { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 16px; margin-bottom: 16px; }
.gen-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
.gen-row:last-child { margin-bottom: 0; }
.gen-label { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }

.team-preview-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 12px; overflow: hidden; }
.tp-head { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; background: var(--surface2); border-bottom: 1px solid var(--border); }
.tp-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 17px; letter-spacing: 0.5px; }
.tp-total { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 17px; color: var(--accent); }
.tp-list { padding: 4px 14px; }
.tp-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); gap: 8px; }
.tp-row:last-child { border-bottom: none; }
.tp-player { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 6px; flex: 1; min-width: 0; }
.tp-player.unavail { color: var(--muted); }
.tp-avg { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; color: var(--muted); white-space: nowrap; }
.swap-btn { background: transparent; border: 1px solid var(--border2); color: var(--muted); padding: 4px 8px; border-radius: 6px; font-size: 11px; cursor: pointer; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; letter-spacing: 0.5px; }
.swap-btn:hover { background: var(--surface3); color: var(--text); }
.swap-btn.selected { background: var(--accent); color: #0a0a0c; border-color: var(--accent); }

.player-search { width: 100%; padding: 10px 14px; background: var(--surface2); border: 1.5px solid var(--border2); border-radius: 12px; color: var(--text); font-size: 14px; outline: none; margin-bottom: 12px; text-align: left; font-family: 'Barlow', sans-serif; font-weight: 500; }
.player-search:focus { border-color: var(--accent); }
.player-card { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 8px; cursor: pointer; transition: all 0.15s; }
.player-card:hover { background: var(--surface2); border-color: var(--border2); }
.player-card .player-avatar { width: 40px; height: 40px; font-size: 15px; }
.player-card-info { flex: 1; min-width: 0; }
.player-card-name { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; display: flex; align-items: center; }
.player-card-stats { font-size: 12px; color: var(--muted); margin-top: 2px; }
.player-card-avg { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 800; color: var(--accent); }

.player-detail-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.back-btn { width: 36px; height: 36px; border-radius: 10px; background: var(--surface2); border: 1px solid var(--border2); color: var(--text); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.player-detail-name { font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 900; line-height: 1; display: flex; align-items: center; }
.player-detail-team { font-size: 12px; color: var(--muted); margin-top: 2px; }

.stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 16px; }
.stat-tile { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 12px; text-align: center; }
.stat-tile-label { font-size: 10px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted); }
.stat-tile-val { font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 800; line-height: 1.1; margin-top: 4px; color: var(--accent); }
.stat-tile-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

.chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 16px; margin-bottom: 16px; }
.chart-title { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
.chart-wrap { position: relative; height: 220px; }

.score-history-table { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
.score-history-row { display: grid; grid-template-columns: 50px 1fr 50px 50px 56px 36px; gap: 6px; padding: 10px 12px; border-bottom: 1px solid var(--border); align-items: center; }
.score-history-row.week-grouped { grid-template-columns: 70px 1fr 50px 50px 56px 28px; }
.score-history-row.clickable { cursor: pointer; transition: background 0.15s; }
.score-history-row.clickable:hover { background: var(--surface2); }
.score-history-row:last-child { border-bottom: none; }
.score-history-row.head { background: var(--surface2); }
.score-history-row.head span { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
.score-history-row span:not(:nth-child(1)):not(:nth-child(2)) { text-align: right; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; }
.sh-week { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 14px; }
.sh-team { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sh-record { font-size: 12px; }
.sh-record.win { color: var(--success); }
.sh-record.loss { color: var(--danger); }
.sh-out { color: var(--muted); font-style: italic; }
.sh-expand-icon { color: var(--muted); font-size: 12px; }
.week-expand { background: var(--bg); padding: 10px 12px 14px; border-bottom: 1px solid var(--border); }
.week-expand-inner .matchup { margin-bottom: 8px; }
.week-expand-inner .matchup:last-child { margin-bottom: 0; }

.board-composer { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 12px; margin-bottom: 16px; }
.board-author-row { display: flex; gap: 8px; margin-bottom: 8px; }

<body>

      <div class="week-badge" id="week-badge">Week 1</div>
      <div class="season-badge" id="season-badge">Season 1</div>
    </div>
  </div>
</header>

<div class="container">
  <div id="section-matchups" class="section active">
    <div id="matchups-content"><div class="loading"><div class="spinner"></div><div class="loading-text">Loading matchups</div></div></div>
  </div>

  </div>

  </div>

  </div>

</div>

<nav>

  <button class="nav-btn" id="nav-rsvp" onclick="switchTab('rsvp')"><span class="nav-icon">📋</span>RSVP</button>
  <button class="nav-btn" id="nav-standings" onclick="switchTab('standings')"><span class="nav-icon">📊</span>Standings</button>
  <button class="nav-btn" id="nav-history" onclick="switchTab('history')"><span class="nav-icon">🗓️</span>Matches</button>
  <button class="nav-btn" id="nav-more" onclick="switchTab('more')"><span class="nav-icon">⋯</span>More</button>
</nav>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script>
const API = "https://script.google.com/macros/s/AKfycbz8sg1ZRlVaD0tXpN6GRlC1awZYu1_KhD7z5Bc88KjsTNntq1dBzAf8aHGbW0th_Tjhiw/exec";
const SC = { SEASON: 0, WEEK: 1, PLAYER: 2, TEAM: 3, G1: 4, G1_OPP: 5, G2: 6, G2_OPP: 7, PINS: 8, WINS: 9, LOSSES: 10, GAMES: 11, PRESENT: 12 };
// Active Week sheet columns
const AW_SEASON = 0, AW_WEEK = 1, AW_TEAM = 2, AW_SLOT = 3, AW_NAME = 4, AW_G1 = 5, AW_G2 = 6, AW_G1_OPP = 7, AW_G2_OPP = 8, AW_IS_FILL = 9;

const state = {
  current: null, roster: null, rsvp: null, stats: null, board: null,
  history: null, champions: null, generated: null, settings: null,
  selectedPlayer: null,
  standingsSeason: null, playerSeason: null,
  playerLogMode: 'bowled',
  expandedWeek: null,
  histSeason: null, histWeek: null,
  recordsSeason: 'all',
  chemMode: 'pairs',
  chemExpanded: false,
  moreView: 'home',
  myName: localStorage.getItem('pb_myname') || '',
  pendingRSVP: {},
  avgDisplay: localStorage.getItem('pb_avgdisplay') || 'last-played',
  matchupsView: 'scores',
  oddsRevealed: false,
  genFillMode: 'League Avg', genAvgSource: 'last-season', genTeams: null,
  genNumTeams: 4, genTeamSize: 3, genFillToSize: false,
  genSwapTarget: null,
  h2hP1: null, h2hP2: null
};

const $ = id => document.getElementById(id);
function initials(name) { if (!name) return '?'; return name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase(); }
function escapeHtml(s) { if (s == null) return ''; return s.toString().replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[c]); }
function timeAgo(date) {
  const d = new Date(date); const s = Math.floor((Date.now() - d.getTime()) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  if (s < 604800) return Math.floor(s/86400) + 'd ago';
  return d.toLocaleDateString();
}
function toast(msg, type = '') {
  const t = document.createElement('div'); t.className = 'toast ' + type; t.textContent = msg;
  document.body.appendChild(t); setTimeout(() => t.remove(), 2400);
}
function openModal(html) { $('modal-content').innerHTML = html; $('modal-backdrop').classList.add('active'); }
function closeModal() { $('modal-backdrop').classList.remove('active'); }
async function apiGet(action) { const r = await fetch(`${API}?action=${action}`); return r.json(); }
async function apiPost(action, payload = {}) {
  const r = await fetch(API, { method: 'POST', body: JSON.stringify({ action, ...payload }) });
  return r.json();
}
function isPresent(v) { return v === true || v === 'TRUE' || v === 1 || v === '1'; }

// CHAMPION TRACKING (Season Champions sheet)
function isChampion(name) {
  if (!state.champions) return false;
  for (let i = 1; i < state.champions.length; i++) {
    if (state.champions[i][1] === name) return true;
  }
  return false;
}
function championsForSeason(seasonNum) {
  if (!state.champions) return [];
  const out = [];
  for (let i = 1; i < state.champions.length; i++) {
    if (parseInt(state.champions[i][0]) === parseInt(seasonNum)) out.push(state.champions[i][1]);
  }
  return out;
}
function nameWithCrown(name) {
  return escapeHtml(name) + (isChampion(name) ? '<span class="champ-crown" title="Past champion">👑</span>' : '');
}

// STATS DERIVATION
function statsRows() { return state.stats ? state.stats.slice(1).filter(r => r[SC.PLAYER]) : []; }
function getSeasons() {
  const s = new Set();
  statsRows().forEach(r => { if (r[SC.SEASON] !== '' && r[SC.SEASON] != null) s.add(String(r[SC.SEASON])); });
  return Array.from(s).sort();
}
function getCurrentSeason() {
  const settingVal = state.settings ? (state.settings.slice(1).find(r => r[0] === 'CurrentSeason') || [])[1] : null;
  if (settingVal) return String(settingVal);
  const s = getSeasons(); return s.length ? s[s.length - 1] : '1';
}
// For view defaults: returns the most recent season that actually has stats.
// Avoids landing users on an empty Season 2 right after End Season.
function getDefaultViewSeason() {
  const s = getSeasons();
  return s.length ? s[s.length - 1] : getCurrentSeason();
}

function aggregateStandings(season) {
  const players = {};
  statsRows().forEach(r => {
    if (season !== 'all' && String(r[SC.SEASON]) !== String(season)) return;
    if (!isPresent(r[SC.PRESENT])) return;
    const name = r[SC.PLAYER];
    if (!players[name]) players[name] = { name, team: r[SC.TEAM], wins: 0, losses: 0, pins: 0, games: 0, weeks: new Set() };
    players[name].wins += parseInt(r[SC.WINS]) || 0;
    players[name].losses += parseInt(r[SC.LOSSES]) || 0;
    players[name].pins += parseInt(r[SC.PINS]) || 0;
    players[name].games += parseInt(r[SC.GAMES]) || 0;
    players[name].weeks.add(String(r[SC.WEEK]));
    players[name].team = r[SC.TEAM];
  });
  return Object.values(players).map(p => ({
    ...p, avg: p.games ? p.pins / p.games : 0, weekCount: p.weeks.size
  })).sort((a, b) => b.wins - a.wins || b.pins - a.pins);
}

function getPlayerProfile(name, season) {
  let rows = statsRows().filter(r => r[SC.PLAYER] === name);
  if (season && season !== 'all') rows = rows.filter(r => String(r[SC.SEASON]) === String(season));

  const games = [];
  rows.forEach(r => {
    const present = isPresent(r[SC.PRESENT]);
    const g1 = parseInt(r[SC.G1]) || 0, g2 = parseInt(r[SC.G2]) || 0;
    const w = parseInt(r[SC.WINS]) || 0, l = parseInt(r[SC.LOSSES]) || 0;
    if (g1 > 0) games.push({ season: r[SC.SEASON], week: r[SC.WEEK], team: r[SC.TEAM], score: g1, gameNum: 1, present, w, l });
    if (g2 > 0) games.push({ season: r[SC.SEASON], week: r[SC.WEEK], team: r[SC.TEAM], score: g2, gameNum: 2, present, w, l });
  });

  const presentGames = games.filter(g => g.present);
  const allScores = presentGames.map(g => g.score);
  const avg = allScores.length ? allScores.reduce((a,b)=>a+b,0) / allScores.length : 0;
  const last5 = allScores.slice(-5);
  const last5Avg = last5.length ? last5.reduce((a,b)=>a+b,0) / last5.length : 0;
  const presentRows = rows.filter(r => isPresent(r[SC.PRESENT]));
  const totalWins = presentRows.reduce((a,r) => a + (parseInt(r[SC.WINS])||0), 0);
  const totalLosses = presentRows.reduce((a,r) => a + (parseInt(r[SC.LOSSES])||0), 0);
  const totalGames = presentRows.reduce((a,r) => a + (parseInt(r[SC.GAMES])||0), 0);
  const highGame = allScores.length ? Math.max(...allScores) : 0;

  // All-time and current-season averages (always computed)
  const allTimeRows = statsRows().filter(r => r[SC.PLAYER] === name && isPresent(r[SC.PRESENT]));
  const ats = []; allTimeRows.forEach(r => {
    if (r[SC.G1] && parseInt(r[SC.G1]) > 0) ats.push(parseInt(r[SC.G1]));
    if (r[SC.G2] && parseInt(r[SC.G2]) > 0) ats.push(parseInt(r[SC.G2]));
  });
  const allTimeAvg = ats.length ? ats.reduce((a,b)=>a+b,0)/ats.length : 0;

  const curSeason = getCurrentSeason();
  const curRows = allTimeRows.filter(r => String(r[SC.SEASON]) === String(curSeason));
  const cs = []; curRows.forEach(r => {
    if (r[SC.G1] && parseInt(r[SC.G1]) > 0) cs.push(parseInt(r[SC.G1]));
    if (r[SC.G2] && parseInt(r[SC.G2]) > 0) cs.push(parseInt(r[SC.G2]));
  });
  const seasonAvg = cs.length ? cs.reduce((a,b)=>a+b,0)/cs.length : 0;

  return { name, games, rows, avg, allTimeAvg, seasonAvg, last5Avg, totalWins, totalLosses, totalGames, highGame };
}

// Get all weeks where this player has any record (present OR absent)
function getAllPlayerWeeks(name) {
  const out = [];
  statsRows().forEach(r => {
    if (r[SC.PLAYER] === name) out.push(r);
  });
  return out;
}

function getMatchupsForWeek(season, week) {
  const rows = statsRows().filter(r => String(r[SC.SEASON]) === String(season) && String(r[SC.WEEK]) === String(week));
  if (!rows.length) return [];
  const buildGameMap = (gameNum) => {
    const teamRosters = {};
    rows.forEach(r => {
      const team = r[SC.TEAM];
      const opp = r[gameNum === 1 ? SC.G1_OPP : SC.G2_OPP];
      const score = parseInt(r[gameNum === 1 ? SC.G1 : SC.G2]) || 0;
      if (!team) return;
      // Include row even if no opp (so absent players show up); group on team
      if (!teamRosters[team]) teamRosters[team] = { team, opp: opp || '', players: [], total: 0 };
      teamRosters[team].players.push({ name: r[SC.PLAYER], score, present: isPresent(r[SC.PRESENT]) });
      teamRosters[team].total += score;
      if (opp && !teamRosters[team].opp) teamRosters[team].opp = opp;
    });
    return teamRosters;
  };
  const buildPairings = (gameNum) => {
    const map = buildGameMap(gameNum);
    const seen = new Set();
    const pairings = [];
    Object.values(map).forEach(t => {
      if (seen.has(t.team)) return;
      const oppData = t.opp ? map[t.opp] : null;
      if (oppData && oppData.opp === t.team) {
        seen.add(t.team); seen.add(t.opp);
        pairings.push({ gameNum, a: t, b: oppData });
      } else {
        seen.add(t.team);
        pairings.push({ gameNum, a: t, b: null });
      }
    });
    return pairings;
  };
  return [...buildPairings(1), ...buildPairings(2)];
}

function getWeeksForSeason(season) {
  const weeks = new Set();
  statsRows().forEach(r => { if (String(r[SC.SEASON]) === String(season) && r[SC.WEEK] !== '' && r[SC.WEEK] != null) weeks.add(String(r[SC.WEEK])); });
  return Array.from(weeks).sort((a, b) => {
    const na = parseInt(a), nb = parseInt(b);
    if (!isNaN(na) && !isNaN(nb)) return na - nb;
    if (!isNaN(na)) return -1;
    if (!isNaN(nb)) return 1;
    return a.localeCompare(b);
  });
}

// HEAD-TO-HEAD with split records
function getH2H(p1, p2) {
  // For each (season, week, gameNum) where these two were on opposing teams, record:
  // - team game outcome (which team won)
  // - individual pin total (who scored more pins)
  const result = { teamP1Wins: 0, teamP2Wins: 0, teamTies: 0, pinP1Wins: 0, pinP2Wins: 0, pinTies: 0, games: [] };

  const allRowsByKey = {};
  statsRows().forEach(r => {
    const key = r[SC.SEASON] + '|' + r[SC.WEEK];
    if (!allRowsByKey[key]) allRowsByKey[key] = [];
    allRowsByKey[key].push(r);
  });

  Object.entries(allRowsByKey).forEach(([key, rows]) => {
    const r1 = rows.find(r => r[SC.PLAYER] === p1);
    const r2 = rows.find(r => r[SC.PLAYER] === p2);
    if (!r1 || !r2) return;

    [1, 2].forEach(gNum => {
      const gCol = gNum === 1 ? SC.G1 : SC.G2;
      const oppCol = gNum === 1 ? SC.G1_OPP : SC.G2_OPP;
      // p1's team played p2's team this game?
      if (r1[oppCol] === r2[SC.TEAM] && r2[oppCol] === r1[SC.TEAM]) {
        const t1Total = rows.filter(r => r[SC.TEAM] === r1[SC.TEAM]).reduce((s, r) => s + (parseInt(r[gCol]) || 0), 0);
        const t2Total = rows.filter(r => r[SC.TEAM] === r2[SC.TEAM]).reduce((s, r) => s + (parseInt(r[gCol]) || 0), 0);
        const p1Score = parseInt(r1[gCol]) || 0;
        const p2Score = parseInt(r2[gCol]) || 0;

        if (t1Total > t2Total) result.teamP1Wins++;
        else if (t2Total > t1Total) result.teamP2Wins++;
        else result.teamTies++;

        if (p1Score > p2Score) result.pinP1Wins++;
        else if (p2Score > p1Score) result.pinP2Wins++;
        else if (p1Score && p2Score) result.pinTies++;

        result.games.push({ season: r1[SC.SEASON], week: r1[SC.WEEK], gameNum: gNum, t1Total, t2Total, p1Score, p2Score });
      }
    });
  });

  return result;
}

// CHEMISTRY — pairs and trios
function getChemistry(groupSize) {
  // Group rows by season+week+team (only present players count)
  const teamWeeks = {};
  statsRows().forEach(r => {
    if (!isPresent(r[SC.PRESENT])) return;
    const key = r[SC.SEASON] + '|' + r[SC.WEEK] + '|' + r[SC.TEAM];
    if (!teamWeeks[key]) teamWeeks[key] = [];
    teamWeeks[key].push(r);
  });

  const groups = {};
  Object.values(teamWeeks).forEach(g => {
    if (g.length < groupSize) return;
    const combos = combinations(g, groupSize);
    combos.forEach(combo => {
      const names = combo.map(r => r[SC.PLAYER]).sort();
      const key = names.join('|');
      // Use one representative for team W/L (all share same team-week record)
      const rep = combo[0];
      if (!groups[key]) groups[key] = { names, wins: 0, losses: 0, games: 0, weeks: 0 };
      groups[key].wins += parseInt(rep[SC.WINS]) || 0;
      groups[key].losses += parseInt(rep[SC.LOSSES]) || 0;
      groups[key].games += parseInt(rep[SC.GAMES]) || 0;
      groups[key].weeks++;
    });
  });

  const minWeeks = groupSize === 2 ? 2 : 1;
  return Object.values(groups)
    .filter(p => p.weeks >= minWeeks)
    .map(p => ({ ...p, winRate: p.games ? p.wins / p.games : 0 }))
    .sort((a, b) => b.winRate - a.winRate || b.games - a.games);
}

function combinations(arr, k) {
  if (k > arr.length) return [];
  if (k === 1) return arr.map(x => [x]);
  const out = [];
  for (let i = 0; i <= arr.length - k; i++) {
    const rest = combinations(arr.slice(i + 1), k - 1);
    rest.forEach(r => out.push([arr[i], ...r]));
  }
  return out;
}

// LEAGUE RECORDS with season filter
function getLeagueRecords(season) {
  const filterSeason = season && season !== 'all' ? String(season) : null;
  const recs = {
    highGame: { val: 0, by: '', when: '' },
    highSeries: { val: 0, by: '', when: '' },
    highTeamGame: { val: 0, team: '', when: '', roster: [] },
    highTeamNight: { val: 0, team: '', when: '', g1Roster: [], g2Roster: [], g1Total: 0, g2Total: 0 },
    bestSeasonAvg: { val: 0, by: '', when: '' }
  };

  const rows = statsRows().filter(r => isPresent(r[SC.PRESENT]) && (!filterSeason || String(r[SC.SEASON]) === filterSeason));

  rows.forEach(r => {
    const g1 = parseInt(r[SC.G1]) || 0, g2 = parseInt(r[SC.G2]) || 0;
    const series = g1 + g2;
    if (g1 > recs.highGame.val) recs.highGame = { val: g1, by: r[SC.PLAYER], when: `S${r[SC.SEASON]} W${r[SC.WEEK]} G1` };
    if (g2 > recs.highGame.val) recs.highGame = { val: g2, by: r[SC.PLAYER], when: `S${r[SC.SEASON]} W${r[SC.WEEK]} G2` };
    if (series > recs.highSeries.val && g1 && g2) recs.highSeries = { val: series, by: r[SC.PLAYER], when: `S${r[SC.SEASON]} W${r[SC.WEEK]}` };
  });

  const teamGroups = {};
  rows.forEach(r => {
    const key = r[SC.SEASON] + '|' + r[SC.WEEK] + '|' + r[SC.TEAM];
    if (!teamGroups[key]) teamGroups[key] = [];
    teamGroups[key].push(r);
  });
  Object.entries(teamGroups).forEach(([key, grows]) => {
    const [s, w, team] = key.split('|');
    const g1Roster = grows.filter(r => parseInt(r[SC.G1])).map(r => ({ name: r[SC.PLAYER], score: parseInt(r[SC.G1]) }));
    const g2Roster = grows.filter(r => parseInt(r[SC.G2])).map(r => ({ name: r[SC.PLAYER], score: parseInt(r[SC.G2]) }));
    const g1Total = g1Roster.reduce((s, p) => s + p.score, 0);
    const g2Total = g2Roster.reduce((s, p) => s + p.score, 0);
    const night = g1Total + g2Total;
    if (g1Total > recs.highTeamGame.val) recs.highTeamGame = { val: g1Total, team, when: `S${s} W${w} G1`, roster: g1Roster };
    if (g2Total > recs.highTeamGame.val) recs.highTeamGame = { val: g2Total, team, when: `S${s} W${w} G2`, roster: g2Roster };
    if (night > recs.highTeamNight.val) {
      recs.highTeamNight = { val: night, team, when: `S${s} W${w}`, g1Roster, g2Roster, g1Total, g2Total };
    }
  });

  // Best season avg
  const seasons = filterSeason ? [filterSeason] : getSeasons();
  seasons.forEach(s => {
    const standings = aggregateStandings(s);
    standings.forEach(p => {
      if (p.avg > recs.bestSeasonAvg.val) recs.bestSeasonAvg = { val: p.avg, by: p.name, when: `S${s}` };
    });
  });

  return recs;
}

function getTeamTotals(d) {
  const sum = (rows, col) => rows.reduce((a, r) => a + (Number(r[col]) || 0), 0);
  return {
    t1g1: sum(d.slice(5,8), 2), t3g1: sum(d.slice(5,8), 6),
    t2g1: sum(d.slice(10,13), 2), t4g1: sum(d.slice(10,13), 6),
    t4g2: sum(d.slice(18,21), 2), t1g2: sum(d.slice(18,21), 6),
    t3g2: sum(d.slice(23,26), 2), t2g2: sum(d.slice(23,26), 6)
  };
}
function getPlayerCurrentAvg(name, sourceOverride) {
  const source = sourceOverride || state.avgDisplay || 'last-played';
  // sources: 'current-season' | 'all-time' | 'last-played'
  if (source === 'last-played') {
    // Use most recent season the player has data in
    const rows = statsRows().filter(r => r[SC.PLAYER] === name && isPresent(r[SC.PRESENT]));
    if (!rows.length) return 0;
    const seasons = Array.from(new Set(rows.map(r => String(r[SC.SEASON])))).sort();
    const lastSeason = seasons[seasons.length - 1];
    const lastSeasonRows = rows.filter(r => String(r[SC.SEASON]) === lastSeason);
    const scores = [];
    lastSeasonRows.forEach(r => {
      const g1 = parseInt(r[SC.G1]) || 0, g2 = parseInt(r[SC.G2]) || 0;
      if (g1 > 0) scores.push(g1);
      if (g2 > 0) scores.push(g2);
    });
    return scores.length ? scores.reduce((a, b) => a + b, 0) / scores.length : 0;
  }
  if (source === 'current-season') {
    const cur = getCurrentSeason();
    const standings = aggregateStandings(cur);
    const p = standings.find(s => s.name === name);
    return p && p.avg ? p.avg : 0;
  }
  // all-time
  const standings = aggregateStandings('all');
  const p = standings.find(s => s.name === name);
  return p && p.avg ? p.avg : 0;
}

function getLeagueAvg(source) {
  source = source || state.avgDisplay || 'last-played';
  if (source === 'last-played') {
    // Get every player's last-season avg, then league avg of those
    const playerNames = Array.from(new Set(statsRows().filter(r => isPresent(r[SC.PRESENT])).map(r => r[SC.PLAYER])));
    const avgs = playerNames.map(n => getPlayerCurrentAvg(n, 'last-played')).filter(v => v > 0);
    return avgs.length ? avgs.reduce((a, b) => a + b, 0) / avgs.length : 0;
  }
  if (source === 'current-season') {
    const cur = getCurrentSeason();
    const rows = statsRows().filter(r => String(r[SC.SEASON]) === String(cur) && isPresent(r[SC.PRESENT]));
    const totalPins = rows.reduce((s, r) => s + (parseInt(r[SC.PINS]) || 0), 0);
    const totalGames = rows.reduce((s, r) => s + (parseInt(r[SC.GAMES]) || 0), 0);
    return totalGames ? totalPins / totalGames : 0;
  }
  // all-time
  const rows = statsRows().filter(r => isPresent(r[SC.PRESENT]));
  const totalPins = rows.reduce((s, r) => s + (parseInt(r[SC.PINS]) || 0), 0);
  const totalGames = rows.reduce((s, r) => s + (parseInt(r[SC.GAMES]) || 0), 0);
  return totalGames ? totalPins / totalGames : 0;
}

// Compute spread/moneyline given two avg-based expected totals
function spreadAndML(t1, t2) {
  const diff = t1 - t2;
  const fav = diff > 0 ? 't1' : (diff < 0 ? 't2' : 'tie');
  const spread = Math.abs(diff);
  // Bowling-realistic moneyline. ~5% per pin of edge, with juice.
  // 5 pins ≈ -130, 15 pins ≈ -180, 30 pins ≈ -240, 50+ ≈ -350
  const ml = (d) => {
    const a = Math.abs(d);
    if (a === 0) return { fav: 'EVEN', dog: 'EVEN' };
    if (a < 4) return { fav: '-115', dog: '-105' };
    if (a < 8) return { fav: '-135', dog: '+115' };
    if (a < 14) return { fav: '-160', dog: '+140' };
    if (a < 22) return { fav: '-200', dog: '+170' };
    if (a < 32) return { fav: '-240', dog: '+200' };
    if (a < 45) return { fav: '-300', dog: '+240' };
    return { fav: '-380', dog: '+300' };
  };
  return { fav, spread, ml: ml(diff) };
}

function hasActiveWeek() {
  if (!state.active || state.active.length < 2) return false;
  // Check if there's at least one non-empty data row (name in slot)
  for (let i = 1; i < state.active.length; i++) {
    if (state.active[i] && state.active[i][AW_NAME]) return true;
  }
  return false;
}

// Read Active Week into a structured form
function readActiveWeek() {
  const teams = {};   // teamName -> { name, players: [{name, slot, g1, g2, isFill}], opponents: {1: 'Team X', 2: 'Team Y'} }
  if (!state.active) return teams;
  for (let i = 1; i < state.active.length; i++) {
    const r = state.active[i];
    if (!r || !r[AW_NAME]) continue;
    const team = r[AW_TEAM];
    if (!teams[team]) teams[team] = { name: team, players: [], opponents: {} };
    const p = {
      name: r[AW_NAME],
      slot: parseInt(r[AW_SLOT]) || 0,
      g1: r[AW_G1] === '' || r[AW_G1] == null ? '' : (parseInt(r[AW_G1]) || 0),
      g2: r[AW_G2] === '' || r[AW_G2] == null ? '' : (parseInt(r[AW_G2]) || 0),
      isFill: r[AW_IS_FILL] === true || r[AW_IS_FILL] === 'TRUE' || r[AW_IS_FILL] === 1
    };
    teams[team].players.push(p);
    if (r[AW_G1_OPP]) teams[team].opponents[1] = r[AW_G1_OPP];
    if (r[AW_G2_OPP]) teams[team].opponents[2] = r[AW_G2_OPP];
  }
  // Sort players by slot within each team
  Object.values(teams).forEach(t => t.players.sort((a, b) => a.slot - b.slot));
  return teams;
}

function renderActiveMatchups() {
  const teams = readActiveWeek();
  const teamNames = Object.keys(teams).sort();  // Team 1, Team 2, Team 3, Team 4

  // Compute team total per game
  const teamTotals = { 1: {}, 2: {} };
  teamNames.forEach(t => {
    teamTotals[1][t] = teams[t].players.reduce((s, p) => s + (parseInt(p.g1) || 0), 0);
    teamTotals[2][t] = teams[t].players.reduce((s, p) => s + (parseInt(p.g2) || 0), 0);
  });

  // Build unique matchup pairings per game from opponent fields
  function buildPairings(gameNum) {
    const seen = new Set();
    const pairings = [];
    teamNames.forEach(t => {
      if (seen.has(t)) return;
      const opp = teams[t].opponents[gameNum];
      if (opp && teams[opp] && teams[opp].opponents[gameNum] === t) {
        seen.add(t); seen.add(opp);
        pairings.push({ a: t, b: opp });
      } else if (!opp) {
        // Team sits out this game

        pairings.push({ a: t, b: null });

  }

  const g1Pairings = buildPairings(1);

  let html = `<div class="tab-title">

    : state.avgDisplay === 'all-time' ? 'All-time Avg'
    : 'Last Season Avg';
  html += `<div class="league-avg-banner">
    <div class="league-avg-info">
      <div class="league-avg-label">League ${sourceLabel}</div>
      <div class="league-avg-val">${leagueAvg > 0 ? leagueAvg.toFixed(1) : '—'}</div>
    </div>
    <select class="avg-source-select" onchange="state.avgDisplay=this.value;localStorage.setItem('pb_avgdisplay',this.value);renderMatchups();">
      <option value="last-played" ${state.avgDisplay==='last-played'?'selected':''}>Last Season</option>

    </select>
  </div>`;

  function renderTeamBlockActive(teamName, gameNum, isWinner) {
    const t = teams[teamName];
    if (!t) return '';
    const total = teamTotals[gameNum][teamName];
    const playerRows = t.players.map(p => {
      const score = gameNum === 1 ? p.g1 : p.g2;
      const avg = p.isFill ? leagueAvg : getPlayerCurrentAvg(p.name);
      const absent = !p.isFill && isPlayerOut(p.name);
      const champ = !p.isFill && isChampion(p.name);
      let cells = '';
      if (mode === 'expected') {
        const exp = avg > 0 ? Math.round(avg) : '—';
        cells = `<div class="score-group"><span class="score-label">G${gameNum}</span><div class="score-display" style="color:var(--muted);">${exp}</div></div>`;
      } else if (p.isFill) {
        // Fill placeholder uses league avg, no input
        cells = `<div class="score-group"><span class="score-label">G${gameNum}</span><div class="score-display" style="color:var(--muted);">${Math.round(leagueAvg)}</div></div>`;
      } else {
        const initial = score === '' || score == null ? '' : score;
        cells = `<div class="score-group"><span class="score-label">G${gameNum}</span>
          <div class="score-input-wrap">
            <input type="number" inputmode="numeric" pattern="[0-9]*" class="${initial ? 'has-score' : ''}" placeholder="—" value="${initial}" data-team="${escapeHtml(teamName)}" data-slot="${p.slot}" data-game="${gameNum}" data-initial="${initial}" oninput="onActiveScoreEdit(this)">
            <button class="score-confirm" data-for="${escapeHtml(teamName)}-${p.slot}-${gameNum}" onclick="confirmActiveScore('${escapeHtml(teamName)}', ${p.slot}, ${gameNum})" style="display:none;">✓</button>
          </div>
        </div>`;
      }
      const displayName = p.isFill ? `<span style="color:var(--muted);font-style:italic;">League Avg Fill</span>` : nameWithCrown(p.name);
      const avgLine = (avg > 0 && !p.isFill) ? `<div class="player-avg">avg ${avg.toFixed(1)}</div>` : (p.isFill ? `<div class="player-avg">fill</div>` : '');
      return `<div class="player-row ${absent?'absent':''}">
        <div class="player-avatar ${champ?'champ':''}">${p.isFill ? '∅' : initials(p.name)}</div>
        <div class="player-info">
          <div class="player-name">${displayName}${absent?'<span class="absent-tag">OUT</span>':''}${p.isFill?'<span class="fill-tag">FILL</span>':''}</div>
          ${avgLine}
        </div>
        <div class="score-inputs">${cells}</div>
      </div>`;
    }).join('');

    const expectedTotal = t.players.reduce((s, p) => {
      const a = p.isFill ? leagueAvg : getPlayerCurrentAvg(p.name);
      return s + (a > 0 ? Math.round(a) : 0);
    }, 0);

    let totalRow;
    if (mode === 'expected') {
      totalRow = `<div class="team-total-row"><span class="total-label">Expected total</span><div class="total-meta"><span class="total-val total-losing">${expectedTotal}</span></div></div>`;
    } else if (total > 0) {
      const cls = isWinner ? 'total-winning' : 'total-losing';
      totalRow = `<div class="team-total-row"><span class="total-label">Team total</span><div class="total-meta"><span class="total-val ${cls}">${total}</span></div></div>`;
    } else {
      totalRow = '';
    }

    const winnerCls = total > 0 && isWinner ? 'winner' : '';
    return `<div class="team-block ${winnerCls}">
      <div class="team-label ${winnerCls}">${escapeHtml(teamName)}</div>
      ${playerRows}
      ${totalRow}
    </div>`;
  }

  function renderPairing(p, gameNum) {
    const aTotal = teamTotals[gameNum][p.a] || 0;
    const bTotal = p.b ? (teamTotals[gameNum][p.b] || 0) : 0;
    const aWins = aTotal > bTotal;
    const bWins = bTotal > aTotal;
    if (!p.b) {
      return `<div class="matchup">${renderTeamBlockActive(p.a, gameNum, false)}<div style="padding:10px 16px;color:var(--muted);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;text-align:center;font-family:'Barlow Condensed',sans-serif;">— sits out —</div></div>`;
    }
    return `<div class="matchup">
      ${renderTeamBlockActive(p.a, gameNum, aWins)}
      <div class="vs-bar"><div class="vs-left"></div><div class="vs-chip">VS</div><div class="vs-right"></div></div>
      ${renderTeamBlockActive(p.b, gameNum, bWins)}
    </div>`;
  }

  if (g1Pairings.length) {
    html += `<div class="match-header"><div class="match-title">Game 1</div></div>`;
    g1Pairings.forEach(p => html += renderPairing(p, 1));
  }
  if (g2Pairings.length) {
    html += `<div class="match-header"><div class="match-title">Game 2</div></div>`;
    g2Pairings.forEach(p => html += renderPairing(p, 2));
  }

  // Odds easter egg
  if (mode === 'expected') {
    html += `<div class="odds-toggle">
      <span class="odds-toggle-link" onclick="state.oddsRevealed=!state.oddsRevealed;renderMatchups();">${state.oddsRevealed ? '· hide odds ·' : '· · ·'}</span>
    </div>`;
    if (state.oddsRevealed) {
      const expectedTotal = teamName => {
        return teams[teamName].players.reduce((s, p) => {
          const a = p.isFill ? leagueAvg : getPlayerCurrentAvg(p.name);
          return s + (a > 0 ? Math.round(a) : 0);
        }, 0);
      };
      const rosterFor = teamName => teams[teamName].players.map(p => p.isFill ? 'Fill' : p.name);
      let oddsHtml = `<div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;margin-top:8px;">
        <div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;letter-spacing:2px;text-transform:uppercase;color:var(--accent2);margin-bottom:10px;">Tonight's Lines</div>`;
      [...g1Pairings.map(p => ({...p, gameNum:1})), ...g2Pairings.map(p => ({...p, gameNum:2}))].forEach(p => {
        if (!p.b) return;
        const e1 = expectedTotal(p.a), e2 = expectedTotal(p.b);
        const odds = spreadAndML(e1, e2);
        oddsHtml += renderOddsBlock(`Game ${p.gameNum} · ${p.a} vs ${p.b}`, odds, p.a, p.b, e1, e2, rosterFor(p.a), rosterFor(p.b));
      });
      oddsHtml += `<div style="font-size:10px;color:var(--muted2);margin-top:10px;font-style:italic;">For entertainment only. Lines are made up.</div></div>`;
      html += oddsHtml;
    }
  }

  $('matchups-content').innerHTML = html;
}

// LEGACY Current Week renderer (kept for backward compat / pre-migration weeks)

  html += renderMatchupCard(t2g1, t4g1, T.t2g1, T.t4g1, 'Team 2', 'Team 4', exp_t2g1, exp_t4g1, mode);

function renderMatchupCard(t1Players, t2Players, t1Total, t2Total, t1Label, t2Label, exp1, exp2, mode) {
  return `<div class="matchup">
    ${renderTeamBlock(t1Label, t1Players, t1Total > t2Total, t1Total, exp1, mode)}
    <div class="vs-bar"><div class="vs-left"></div><div class="vs-chip">VS</div><div class="vs-right"></div></div>
    ${renderTeamBlock(t2Label, t2Players, t2Total > t1Total, t2Total, exp2, mode)}
  </div>`;
}

// Get player names for a team from the current week sheet
function getCurrentRoster(d, rowIndices, isCol1) {
  const out = [];
  rowIndices.forEach(i => {
    const row = d[i]; if (!row) return;
    const name = isCol1 ? row[0] : row[4];
    if (name) out.push(name);
  });
  return out;
}

function renderOddsBlock(label, odds, t1Name, t2Name, e1, e2, t1Roster, t2Roster) {
  const t1IsFav = odds.fav === 't1';
  const favName = t1IsFav ? t1Name : (odds.fav === 't2' ? t2Name : '');
  const dogName = t1IsFav ? t2Name : (odds.fav === 'tie' ? '' : t1Name);
  const rosterLine = (names) => names.length ? names.join(' · ') : '—';

  if (odds.fav === 'tie') {
    return `<div class="odds-block">
      <div class="odds-block-head">
        <span class="odds-block-label">${label}</span>
        <span class="odds-block-pickem">PICK 'EM (${e1})</span>
      </div>
      <div class="odds-block-teams">
        <div class="odds-team-side"><div class="odds-team-name">${t1Name}</div><div class="odds-roster">${rosterLine(t1Roster)}</div></div>
        <div class="odds-team-side"><div class="odds-team-name">${t2Name}</div><div class="odds-roster">${rosterLine(t2Roster)}</div></div>
      </div>
    </div>`;
  }

  return `<div class="odds-block">
    <div class="odds-block-head">
      <span class="odds-block-label">${label}</span>
      <div class="odds-line">
        <span class="odds-chip fav">${favName} -${odds.spread}</span>
        <span class="odds-chip fav">${odds.ml.fav}</span>
        <span class="odds-chip dog">${dogName} ${odds.ml.dog}</span>
      </div>
    </div>
    <div class="odds-block-teams">
      <div class="odds-team-side ${t1IsFav?'fav':'dog'}">
        <div class="odds-team-name">${t1Name} ${t1IsFav?'<span class="odds-tag-fav">FAV</span>':''}<span class="odds-team-proj">${e1}</span></div>
        <div class="odds-roster">${rosterLine(t1Roster)}</div>
      </div>
      <div class="odds-team-side ${!t1IsFav?'fav':'dog'}">
        <div class="odds-team-name">${t2Name} ${!t1IsFav?'<span class="odds-tag-fav">FAV</span>':''}<span class="odds-team-proj">${e2}</span></div>
        <div class="odds-roster">${rosterLine(t2Roster)}</div>
      </div>
    </div>
  </div>`;
}

// Score input handlers - show confirm button when changed, save on confirm tap
function onScoreEdit(input) {
  const cell = input.dataset.cell;
  const initial = input.dataset.initial || '';
  const current = input.value;
  const btn = document.querySelector(`.score-confirm[data-for="${cell}"]`);
  if (!btn) return;
  if (current !== initial) {
    btn.style.display = 'flex';
  } else {
    btn.style.display = 'none';
  }
}

// Active Week variant — keyed by team+slot+game instead of cell address
function onActiveScoreEdit(input) {
  const team = input.dataset.team;
  const slot = input.dataset.slot;
  const game = input.dataset.game;
  const key = `${team}-${slot}-${game}`;
  const initial = input.dataset.initial || '';
  const current = input.value;
  const btn = document.querySelector(`.score-confirm[data-for="${key}"]`);
  if (!btn) return;
  btn.style.display = (current !== initial) ? 'flex' : 'none';
}

async function confirmActiveScore(team, slot, gameNum) {
  const key = `${team}-${slot}-${gameNum}`;
  // Find by exact attribute match (querySelector with escaped quotes)
  const inputs = document.querySelectorAll(`input[data-team][data-slot="${slot}"][data-game="${gameNum}"]`);
  let input = null;
  inputs.forEach(i => { if (i.dataset.team === team) input = i; });
  const btn = document.querySelector(`.score-confirm[data-for="${CSS.escape(key)}"]`) ||
              Array.from(document.querySelectorAll('.score-confirm')).find(b => b.dataset.for === key);
  if (!input) { toast('Input not found', 'error'); return; }
  const val = input.value;
  if (val === '' || val == null) { toast('Enter a score first', 'error'); return; }
  const n = parseInt(val);
  if (isNaN(n) || n < 0 || n > 300) { toast('Score must be 0-300', 'error'); return; }

  input.style.opacity = '0.5';
  if (btn) btn.disabled = true;
  try {
    const r = await apiPost('updateActiveScore', { team, slot, gameNum, score: val });
    if (r.error) { toast(r.error, 'error'); input.style.opacity = '1'; if (btn) btn.disabled = false; return; }
    input.classList.add('has-score');
    input.dataset.initial = val;
    if (btn) btn.style.display = 'none';
    // Update local state.active in-place
    if (state.active) {
      for (let i = 1; i < state.active.length; i++) {
        const row = state.active[i];
        if (!row) continue;
        if (String(row[AW_TEAM]) === team && parseInt(row[AW_SLOT]) === parseInt(slot)) {
          state.active[i][gameNum === 1 ? AW_G1 : AW_G2] = parseInt(val);
          break;
        }
      }
    }
    // Re-render but preserve focus
    const active = document.activeElement;
    const aTeam = active && active.dataset ? active.dataset.team : null;
    const aSlot = active && active.dataset ? active.dataset.slot : null;
    const aGame = active && active.dataset ? active.dataset.game : null;
    const aSelStart = active && active.selectionStart != null ? active.selectionStart : null;
    renderMatchups();
    if (aTeam) {
      Array.from(document.querySelectorAll(`input[data-team][data-slot="${aSlot}"][data-game="${aGame}"]`))
        .filter(i => i.dataset.team === aTeam)
        .forEach(newInput => {
          newInput.focus();
          if (aSelStart != null) try { newInput.setSelectionRange(aSelStart, aSelStart); } catch(e){}
        });
    }
    toast('Saved', 'success');
  } catch(e) {
    toast('Save failed', 'error');
    input.style.opacity = '1';
    if (btn) btn.disabled = false;
  }
}

async function confirmScore(cell) {
  const input = document.querySelector(`input[data-cell="${cell}"]`);
  const btn = document.querySelector(`.score-confirm[data-for="${cell}"]`);
  if (!input) return;
  const val = input.value;
  if (val === '' || val == null) {
    toast('Enter a score first', 'error');
    return;
  }
  const n = parseInt(val);
  if (isNaN(n) || n < 0 || n > 300) {
    toast('Score must be 0-300', 'error');
    return;
  }

  input.style.opacity = '0.5';
  if (btn) btn.disabled = true;
  try {
    await apiPost('updateScore', { cell, score: val });
    input.classList.add('has-score');
    input.dataset.initial = val;
    if (btn) btn.style.display = 'none';
    if (state.current) {
      const m = cell.match(/([A-Z]+)(\d+)/);
      if (m) {
        const col = m[1].charCodeAt(0) - 65, row = parseInt(m[2]) - 1;
        if (state.current[row]) state.current[row][col] = parseInt(val);
        // Don't re-render the whole matchups - just update totals
        updateLiveTotals();
      }
    }
    toast('Saved', 'success');
  } catch(e) { toast('Save failed', 'error'); }
  input.style.opacity = '1';
  if (btn) btn.disabled = false;
}

// Refresh the team totals without nuking the inputs (avoids losing focus/cursor)
function updateLiveTotals() {
  if (!state.current) return;
  const T = getTeamTotals(state.current);
  // Find each total-val and update; also winner highlights
  const update = (selector, val, winning) => {
    const el = document.querySelector(selector);
    if (!el) return;
    el.textContent = val > 0 ? val : '—';
    el.classList.toggle('total-winning', val > 0 && winning);
    el.classList.toggle('total-losing', val > 0 && !winning);
  };
  // We'll just call renderMatchups again but preserve focus
  const active = document.activeElement;
  const activeCell = active && active.dataset ? active.dataset.cell : null;
  const activeSelStart = active && active.selectionStart != null ? active.selectionStart : null;
  renderMatchups();
  if (activeCell) {
    const newInput = document.querySelector(`input[data-cell="${activeCell}"]`);
    if (newInput) {
      newInput.focus();
      if (activeSelStart != null) try { newInput.setSelectionRange(activeSelStart, activeSelStart); } catch(e){}
    }
  }
}

// ============================================================
// RSVP
// ============================================================
function renderRSVP() {
  if (!state.roster) return;
  const players = state.roster.slice(1).filter(r => r[0]);
  const rsvpMap = {};
  if (state.rsvp) state.rsvp.slice(1).forEach(r => { if (r[0]) rsvpMap[r[0]] = r[1]; });

  // Apply pending changes for display
  const pending = state.pendingRSVP || {};

  let inCount = 0, outCount = 0, unknown = 0;
  players.forEach(p => {
    const s = pending[p[0]] !== undefined ? pending[p[0]] : (rsvpMap[p[0]] || '');
    if (s === 'In') inCount++; else if (s === 'Out') outCount++; else unknown++;
  });

  let html = `<div class="tab-title"><h2>RSVP</h2></div>`;
  html += `<div class="rsvp-summary">
    <div class="rsvp-stat in"><div class="rsvp-stat-label">In</div><div class="rsvp-stat-val">${inCount}</div></div>
    <div class="rsvp-stat out"><div class="rsvp-stat-label">Out</div><div class="rsvp-stat-val">${outCount}</div></div>
    <div class="rsvp-stat unknown"><div class="rsvp-stat-label">No reply</div><div class="rsvp-stat-val">${unknown}</div></div>
  </div>
  <div class="section-header">This Week<div class="actions"><button class="btn sm danger" onclick="confirmResetRSVP()">Reset</button></div></div>
  <div class="standings-card">`;
  players.forEach(p => {
    const saved = rsvpMap[p[0]] || '';
    const current = pending[p[0]] !== undefined ? pending[p[0]] : saved;
    const isPending = pending[p[0]] !== undefined && pending[p[0]] !== saved;
    html += `<div class="rsvp-row ${isPending ? 'pending' : ''}">
      <div class="rsvp-name">${nameWithCrown(p[0])}${isPending ? '<span class="pending-dot" title="Unsaved"></span>' : ''}</div>
      <div class="rsvp-buttons">
        <button class="rsvp-btn in ${current==='In'?'active':''}" onclick="stageRSVP('${escapeHtml(p[0])}', 'In')">In</button>
        <button class="rsvp-btn out ${current==='Out'?'active':''}" onclick="stageRSVP('${escapeHtml(p[0])}', 'Out')">Out</button>
      </div>
    </div>`;
  });
  html += `</div>`;

  // Pending changes bar
  const pendingCount = Object.keys(pending).filter(name => pending[name] !== (rsvpMap[name] || '')).length;
  if (pendingCount > 0) {
    html += `<div class="confirm-bar">
      <div class="confirm-bar-text">${pendingCount} unsaved change${pendingCount > 1 ? 's' : ''}</div>
      <div class="confirm-bar-actions">
        <button class="btn sm" onclick="discardRSVPChanges()">Discard</button>
        <button class="btn sm primary" onclick="saveRSVPChanges()">Save</button>
      </div>
    </div>`;
  }
  $('rsvp-content').innerHTML = html;
}

function stageRSVP(name, status) {
  if (!state.pendingRSVP) state.pendingRSVP = {};
  // Compare against saved state. If toggling back to saved value, remove from pending.
  const rsvpMap = {};
  if (state.rsvp) state.rsvp.slice(1).forEach(r => { if (r[0]) rsvpMap[r[0]] = r[1]; });
  const saved = rsvpMap[name] || '';

  // If they tap the same button as the current pending/saved value, treat as toggle-off
  const currentPending = state.pendingRSVP[name];
  const current = currentPending !== undefined ? currentPending : saved;
  if (current === status) {
    // Toggle off → empty
    if (saved === '') {
      delete state.pendingRSVP[name];
    } else {
      state.pendingRSVP[name] = '';
    }
  } else {
    if (status === saved) {
      delete state.pendingRSVP[name];
    } else {
      state.pendingRSVP[name] = status;
    }
  }
  renderRSVP();
}

function discardRSVPChanges() {
  state.pendingRSVP = {};
  renderRSVP();
  toast('Discarded', 'success');
}

async function saveRSVPChanges() {
  const pending = state.pendingRSVP || {};
  const rsvpMap = {};
  if (state.rsvp) state.rsvp.slice(1).forEach(r => { if (r[0]) rsvpMap[r[0]] = r[1]; });
  const toSave = Object.keys(pending).filter(name => pending[name] !== (rsvpMap[name] || ''));
  if (!toSave.length) return;

  toast(`Saving ${toSave.length}...`);
  let saved = 0, failed = 0;
  for (const name of toSave) {
    const status = pending[name] || '';
    try {
      await apiPost('updateRSVP', { name, status });
      // Update local state
      if (!state.rsvp) state.rsvp = [['Player','Status','Note','Updated']];
      let found = false;
      for (let i = 1; i < state.rsvp.length; i++) {
        if (state.rsvp[i][0] === name) { state.rsvp[i][1] = status; found = true; break; }
      }
      if (!found) state.rsvp.push([name, status, '', new Date()]);
      saved++;
    } catch(e) {
      failed++;
    }
  }
  state.pendingRSVP = {};
  renderRSVP();
  renderMatchups();
  if (failed) toast(`${saved} saved, ${failed} failed`, 'error');
  else toast(`${saved} saved`, 'success');
}

// Legacy single-status setter still exposed in case anything calls it

function renderMatchHistory() {
  const seasons = getSeasons();
  if (!state.histSeason) state.histSeason = getDefaultViewSeason();
  const weeks = getWeeksForSeason(state.histSeason);
  if (!state.histWeek || !weeks.includes(state.histWeek)) state.histWeek = weeks[weeks.length - 1] || null;

  let html = `<div class="tab-title"><h2>Match History</h2></div>`;
  html += `<div class="filter-bar">
    <select onchange="state.histSeason=this.value;state.histWeek=null;renderMatchHistory();">
      ${seasons.map(s => `<option value="${s}" ${state.histSeason === s ? 'selected' : ''}>Season ${s}</option>`).join('')}
    </select>
    <select onchange="state.histWeek=this.value;renderMatchHistory();">
      ${weeks.map(w => {
        const isPlayoff = isNaN(parseInt(w));
        return `<option value="${w}" ${state.histWeek === w ? 'selected' : ''}>${isPlayoff ? w : 'Week ' + w}</option>`;
      }).join('')}
    </select>
  </div>`;

  if (!weeks.length) {
    html += `<div class="empty-state">No data for this season.</div>`;
    $('history-content').innerHTML = html;
    return;
  }

  const matchups = getMatchupsForWeek(state.histSeason, state.histWeek);
  if (!matchups.length) {
    html += `<div class="empty-state">No data for this week.</div>`;
    $('history-content').innerHTML = html;
    return;
  }
  const game1 = matchups.filter(m => m.gameNum === 1);
  const game2 = matchups.filter(m => m.gameNum === 2);

  if (game1.length) {
    html += `<div class="match-header"><div class="match-title">Game 1</div></div>`;
    game1.forEach(m => html += renderHistoricalMatchup(m));
  }
  if (game2.length) {
    html += `<div class="match-header"><div class="match-title">Game 2</div></div>`;
    game2.forEach(m => html += renderHistoricalMatchup(m));
  }
  $('history-content').innerHTML = html;
}

function renderHistoricalMatchup(m) {
  const a = m.a, b = m.b;
  if (!b) return `<div class="matchup">${renderHistoricalTeamBlock(a, true)}</div>`;
  const aWin = a.total >= b.total;
  return `<div class="matchup">
    ${renderHistoricalTeamBlock(a, aWin)}
    <div class="vs-bar"><div class="vs-left"></div><div class="vs-chip">VS</div><div class="vs-right"></div></div>
    ${renderHistoricalTeamBlock(b, !aWin)}
  </div>`;
}

function renderHistoricalTeamBlock(t, winning) {
  const cls = winning ? 'winner' : '';
  return `<div class="team-block ${cls}">
    <div class="team-label ${cls}">${escapeHtml(t.team)}</div>
    ${t.players.map(p => `
      <div class="player-row ${!p.present ? 'absent' : ''}">
        <div class="player-avatar ${isChampion(p.name) ? 'champ' : ''}">${initials(p.name)}</div>
        <div class="player-info"><div class="player-name">${nameWithCrown(p.name)}${!p.present ? '<span class="absent-tag">OUT</span>' : ''}</div></div>
        <div class="score-inputs"><div class="score-group"><span class="score-label">Score</span>
          <div class="score-display" style="color:${p.score?'var(--text)':'var(--muted)'};">${p.score || '—'}</div>
        </div></div>
      </div>`).join('')}
    <div class="team-total-row"><span class="total-label">Team total</span><div class="total-meta"><span class="total-val ${winning ? 'total-winning' : 'total-losing'}">${t.total}</span></div></div>
  </div>`;
}

  html += `<div class="filter-bar">
    <select onchange="state.playerSeason=this.value;renderPlayerDetail();">

  </div>`;

  html += `<div class="stat-grid">
    <div class="stat-tile"><div class="stat-tile-label">Avg</div><div class="stat-tile-val">${profile.avg > 0 ? profile.avg.toFixed(1) : '—'}</div></div>
    <div class="stat-tile"><div class="stat-tile-label">High Game</div><div class="stat-tile-val">${profile.highGame || '—'}</div></div>
    <div class="stat-tile"><div class="stat-tile-label">W—L</div><div class="stat-tile-val">${profile.totalWins}–${profile.totalLosses}</div></div>
    <div class="stat-tile"><div class="stat-tile-label">Last 5 Avg</div><div class="stat-tile-val">${profile.last5Avg > 0 ? profile.last5Avg.toFixed(1) : '—'}</div></div>

    <div class="stat-tile"><div class="stat-tile-label">Games</div><div class="stat-tile-val">${profile.totalGames}</div></div>
  </div>`;

  // Personal records
  const pRec = getPersonalRecords(name);
  html += `<div class="section-header">Personal Records</div>
  <div class="record-card"><div class="record-card-head"><div class="record-icon">🎳</div><div class="record-info"><div class="record-label">High Game</div><div class="record-value">${pRec.highGame || '—'}</div></div></div></div>
  <div class="record-card"><div class="record-card-head"><div class="record-icon">📈</div><div class="record-info"><div class="record-label">High Series (G1+G2)</div><div class="record-value">${pRec.highSeries || '—'}</div></div></div></div>
  <div class="record-card"><div class="record-card-head"><div class="record-icon">🔥</div><div class="record-info"><div class="record-label">Best Streak</div><div class="record-value">${pRec.bestStreak} ${pRec.bestStreak === 1 ? 'night' : 'nights'}</div>${pRec.currentStreak > 0 ? `<div class="record-detail">Current: ${pRec.currentStreak} ${pRec.currentStreakType === 'W' ? 'win' : 'loss'}${pRec.currentStreak > 1 ? 'es' : ''}</div>` : ''}</div></div></div>`;

  // Score chart
  if (profile.games.length) {
    html += `<div class="chart-card"><div class="chart-title">Score Trend</div><div class="chart-wrap"><canvas id="player-chart"></canvas></div></div>`;
  }

  // Game log toggle
  html += `<div class="section-header">Game Log
    <div class="actions">
      <div class="toggle-group" style="padding:2px;">
        <button class="toggle-btn ${state.playerLogMode === 'bowled' ? 'active' : ''}" onclick="state.playerLogMode='bowled';renderPlayerDetail();" style="font-size:10px;padding:5px 8px;">Bowled</button>
        <button class="toggle-btn ${state.playerLogMode === 'all' ? 'active' : ''}" onclick="state.playerLogMode='all';renderPlayerDetail();" style="font-size:10px;padding:5px 8px;">All Weeks</button>
      </div>
    </div>
  </div>`;

  // Build week-grouped log
  let allWeeklyRows = profile.rows;
  if (state.playerSeason === 'all') {
    allWeeklyRows = statsRows().filter(r => r[SC.PLAYER] === name);
  } else {
    allWeeklyRows = statsRows().filter(r => r[SC.PLAYER] === name && String(r[SC.SEASON]) === String(state.playerSeason));
  }

  // One row per week for this player
  let weekRows = [];
  allWeeklyRows.forEach(r => {
    const present = isPresent(r[SC.PRESENT]);
    if (state.playerLogMode === 'bowled' && !present) return;
    const g1 = parseInt(r[SC.G1]) || 0, g2 = parseInt(r[SC.G2]) || 0;
    const w = parseInt(r[SC.WINS]) || 0, l = parseInt(r[SC.LOSSES]) || 0;
    weekRows.push({
      season: r[SC.SEASON], week: r[SC.WEEK], team: r[SC.TEAM],
      g1, g2, w, l, present
    });
  });

  if (weekRows.length) {
    // Sort newest first (descending season then week)
    weekRows.sort((a, b) => {
      const sa = parseInt(a.season) || 0, sb = parseInt(b.season) || 0;
      if (sa !== sb) return sb - sa;
      const wa = parseInt(a.week) || 0, wb = parseInt(b.week) || 0;
      return wb - wa;
    });

    html += `<div class="score-history-table">
      <div class="score-history-row head week-grouped"><span>Week</span><span>Team</span><span>G1</span><span>G2</span><span>W—L</span><span></span></div>`;
