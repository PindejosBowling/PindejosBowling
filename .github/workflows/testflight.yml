name: Deploy to TestFlight

on:
  workflow_dispatch:

jobs:
  build-and-submit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Set up EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Bump patch version
        id: bump
        run: |
          NEW_VERSION=$(node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            const [maj, min, pat] = cfg.expo.version.split('.').map(Number);
            cfg.expo.version = maj + '.' + min + '.' + (pat + 1);
            fs.writeFileSync('app.json', JSON.stringify(cfg, null, 2) + '\n');
            process.stdout.write(cfg.expo.version);
          ")
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }} [skip ci]"
          git push

      - name: Push Supabase env vars to EAS
        run: |
          printf 'EXPO_PUBLIC_SUPABASE_URL=%s\nEXPO_PUBLIC_SUPABASE_API_KEY=%s\n' "$SUPABASE_URL" "$SUPABASE_KEY" > .env.local
          eas env:push --environment production --force
        env:
          SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_API_KEY }}

      - name: Build and submit to TestFlight
        id: eas-build
        run: |
          BUILD_JSON=$(eas build --platform ios --profile production --auto-submit --non-interactive --json --wait)
          BUILD_ID=$(echo "$BUILD_JSON" | jq -r '.[0].id')
          BUILD_URL="https://expo.dev/accounts/gsblinkhorn/projects/pindejos-bowling/builds/$BUILD_ID"
          echo "build-url=$BUILD_URL" >> "$GITHUB_OUTPUT"
          echo "### iOS Build Submitted to TestFlight" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "[$BUILD_URL]($BUILD_URL)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Note: Apple processes the build asynchronously — allow 15–30 min for TestFlight availability." >> "$GITHUB_STEP_SUMMARY"
