name: Deploy to TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-submit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build and submit to TestFlight
        id: eas-build
        run: |
          BUILD_JSON=$(npx eas build --platform ios --profile production --auto-submit --non-interactive --json)
          BUILD_ID=$(echo "$BUILD_JSON" | jq -r '.[0].id')
          BUILD_URL="https://expo.dev/accounts/gsblinkhorn/projects/pindejos-bowling/builds/$BUILD_ID"
          echo "build-url=$BUILD_URL" >> "$GITHUB_OUTPUT"
          echo "### iOS Build Queued" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "[$BUILD_URL]($BUILD_URL)" >> "$GITHUB_STEP_SUMMARY"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
