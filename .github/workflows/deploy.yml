name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time; in-progress runs are not cancelled so
# a deploy is never abandoned mid-flight.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: npx expo export --platform web
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_API_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_API_KEY }}
          # Read-only "guest" creds, inlined at build time so the deployed web
          # bundle can auto-sign-in while READ_ONLY_MODE is on. Without these the
          # build falls back to the "login unavailable" notice.
          EXPO_PUBLIC_GUEST_EMAIL: ${{ secrets.EXPO_PUBLIC_GUEST_EMAIL }}
          EXPO_PUBLIC_GUEST_PASSWORD: ${{ secrets.EXPO_PUBLIC_GUEST_PASSWORD }}

      # Pindejos has no Expo Router, so `expo export` gives a plain index.html
      # with no head-injection hook. We splice in the add-to-home-screen tags
      # here: an apple-touch-icon (the App Store icon, served from public/icons)
      # plus the manifest + standalone meta so iOS treats it as an installed app
      # instead of falling back to a page-screenshot icon. Runs before the 404
      # copy below so the SPA fallback inherits the same head.
      - name: Inject add-to-home-screen tags into index.html
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const base = '/PindejosBowling';
          const tags = `
            <meta name="apple-mobile-web-app-capable" content="yes" />
            <meta name="mobile-web-app-capable" content="yes" />
            <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
            <meta name="apple-mobile-web-app-title" content="Pindejos" />
            <meta name="application-name" content="Pindejos" />
            <meta name="theme-color" content="#0a0a0c" />
            <link rel="apple-touch-icon" href="${base}/icons/apple-touch-icon.png" />
            <link rel="manifest" href="${base}/manifest.json" />
          `;
          const file = 'dist/index.html';
          let html = fs.readFileSync(file, 'utf8');
          if (!html.includes('</head>')) {
            throw new Error('No </head> found in ' + file + '; cannot inject home-screen tags');
          }
          html = html.replace('</head>', tags + '</head>');
          fs.writeFileSync(file, html);
          console.log('Injected add-to-home-screen tags into ' + file);
          EOF

      - name: Copy index.html to 404.html for SPA routing
        run: cp dist/index.html dist/404.html

      - name: Copy static pages into dist
        run: cp public/consent.html dist/consent.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # OTA update for installed iOS builds (EAS Update). Publishes the JS bundle
  # to the production channel on every merge; installs whose runtime (= the
  # app version baked in at build time) matches pick it up on next launch.
  # Native changes (new module, plugin, SDK bump) do NOT ship this way — they
  # need a TestFlight build (testflight.yml), which also bumps the version so
  # stale JS can never land on a mismatched binary.
  ota-update:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Set up EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Publish EAS Update
        run: eas update --branch production --message "${COMMIT_MSG%%$'\n'*}" --non-interactive
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message || 'manual dispatch' }}
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_API_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_API_KEY }}
