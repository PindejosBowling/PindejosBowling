name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time; in-progress runs are not cancelled so
# a deploy is never abandoned mid-flight.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: npx expo export --platform web
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_API_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_API_KEY }}
          # Read-only "guest" creds, inlined at build time so the deployed web
          # bundle can auto-sign-in while READ_ONLY_MODE is on. Without these the
          # build falls back to the "login unavailable" notice.
          EXPO_PUBLIC_GUEST_EMAIL: ${{ secrets.EXPO_PUBLIC_GUEST_EMAIL }}
          EXPO_PUBLIC_GUEST_PASSWORD: ${{ secrets.EXPO_PUBLIC_GUEST_PASSWORD }}

      - name: Copy index.html to 404.html for SPA routing
        run: cp dist/index.html dist/404.html

      - name: Copy static pages into dist
        run: cp public/consent.html dist/consent.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
